  .card { background:var(--panel); border:1px solid var(--line); border-radius:14px; padding:18px 20px; }
  .card h3 { margin:0 0 12px; font-size:13px; letter-spacing:.06em; text-transform:uppercase; color:var(--mut); }
  .bar { height:12px; border-radius:99px; overflow:hidden; display:flex; background:#0c1117; border:1px solid var(--line); }
  .bar > i { display:block; height:100%; }
  .seg-live{background:var(--good)} .seg-draft-preview{background:var(--warn)} .seg-ready{background:var(--accent)}
  .seg-draft{background:#3b4350} .seg-planned{background:#262d38}
  .legend { display:flex; flex-wrap:wrap; gap:10px 16px; margin-top:12px; font-size:12.5px; color:var(--mut); }
  .legend span { display:inline-flex; align-items:center; gap:6px; }
  .dot { width:10px; height:10px; border-radius:3px; display:inline-block; }
  .big { font-size:34px; font-weight:700; }
  .sub { color:var(--mut); font-size:13px; }
  details.phase { border:1px solid var(--line); border-radius:12px; margin:12px 0; background:var(--panel); overflow:hidden; }
  details.phase > summary { cursor:pointer; list-style:none; padding:15px 18px; display:flex; align-items:center; gap:12px; }
  details.phase > summary::-webkit-details-marker { display:none; }
  summary .pnum { font-size:12px; color:var(--accent); border:1px solid var(--line); border-radius:7px; padding:2px 8px; }
  summary .ptitle { font-weight:600; flex:1; }
  summary .pmeta { font-size:12px; color:var(--mut); }
  .lesson { display:flex; align-items:center; gap:12px; padding:11px 18px; border-top:1px solid var(--line); }
  .lesson:hover { background:#10161e; }
  .ord { font-size:12px; color:var(--mut); width:30px; text-align:right; flex:none; }
  .lt { flex:1; min-width:0; }
  .lt a { color:var(--ink); text-decoration:none; font-weight:500; }
  .lt a:hover { color:var(--accent); text-decoration:underline; }
  .lt .subt { font-size:12px; color:var(--mut); }
  .badge { font-size:11px; padding:3px 9px; border-radius:99px; border:1px solid; white-space:nowrap; flex:none; }
  .b-live{ color:var(--good); border-color:rgba(63,185,80,.4); background:rgba(63,185,80,.1); }
  .b-draft-preview{ color:var(--warn); border-color:rgba(210,153,34,.4); background:rgba(210,153,34,.1); }
  .b-ready{ color:var(--accent); border-color:rgba(79,156,249,.4); background:rgba(79,156,249,.1); }
  .b-draft{ color:#aeb9c6; border-color:var(--line); background:#222a34; }
  .b-planned{ color:var(--plan); border-color:var(--line); background:transparent; }
  .done { flex:none; display:inline-flex; align-items:center; gap:6px; font-size:12px; color:var(--mut); cursor:pointer; }
  .done input { accent-color:var(--good); }
  .open { font-size:12px; color:var(--accent); }
  footer { text-align:center; color:var(--mut); font-size:12px; padding:24px; border-top:1px solid var(--line); }
  .pctl { display:flex; gap:8px; margin-bottom:14px; }
  .pctl button { font:inherit; font-size:12px; cursor:pointer; border:1px solid var(--line); background:var(--panel); color:var(--mut); padding:6px 12px; border-radius:8px; }
</style>
</head>

const LS_KEY = 'pe-demo-progress::' + DATA.course;
const el = id => document.getElementById(id);

el('ctitle').textContent = DATA.course + ' — Interactive Course';
el('openable').textContent = DATA.openable;

function loadDone(){ try { return new Set(JSON.parse(localStorage.getItem(LS_KEY)||'[]')); } catch(e){ return new Set(); } }
function saveDone(set){ localStorage.setItem(LS_KEY, JSON.stringify([...set])); }
let done = loadDone();

// ---- Status label (used by per-lesson badges) ----
const LABEL = {live:'Live', 'draft-preview':'Draft preview', ready:'Ready to script', draft:'Note in draft', planned:'Planned'};

// ---- Phases + lessons ----
const phasesEl = el('phases');
DATA.phases.forEach((ph, pi)=>{
  const counts = {};
  ph.lessons.forEach(l=>counts[l.status]=(counts[l.status]||0)+1);
  const liveN = (counts.live||0)+(counts['draft-preview']||0);
  const det = document.createElement('details'); det.className='phase'; if(liveN) det.open = pi<1;
  const sum = document.createElement('summary');
  sum.innerHTML = '<span class="pnum">PHASE '+ph.phase+'</span>'+
                  '<span class="ptitle">'+ph.title+'</span>'+
                  '<span class="pmeta">'+ph.lessons.length+' lessons · '+liveN+' live</span>';
  det.appendChild(sum);

  let lastSub = null;
  ph.lessons.forEach(l=>{
    const row = document.createElement('div'); row.className='lesson';
    const titleHtml = (l.href)
      ? '<a href="'+l.href+'">'+l.title+'</a> <span class="open">open →</span>'
      : '<span>'+l.title+'</span>';
    const subt = (l.sub && l.sub!==lastSub) ? '<div class="subt">'+l.sub+'</div>' : '';
    lastSub = l.sub;
    row.innerHTML =
      '<span class="ord">'+(l.order||'')+'</span>'+
      '<span class="lt">'+titleHtml+subt+'</span>'+
      '<span class="badge b-'+l.status+'">'+LABEL[l.status]+'</span>';
    if(l.href){
      const lbl = document.createElement('label'); lbl.className='done';
      const cb = document.createElement('input'); cb.type='checkbox'; cb.checked = done.has(l.id);
      cb.onchange = ()=>{ if(cb.checked) done.add(l.id); else done.delete(l.id); saveDone(done); refreshLearner(); };
      lbl.appendChild(cb); lbl.appendChild(document.createTextNode('Done'));
      row.appendChild(lbl);
    }
    det.appendChild(row);
  });
  phasesEl.appendChild(det);
});

// ---- Learner progress ----
function refreshLearner(){
  const n = done.size, o = DATA.openable||0;
  el('donecount').textContent = n;
  el('learnfill').style.width = (o? n/o*100 : 0)+'%';
  el('learnnote').textContent = o
    ? (n>=o && o>0 ? 'All available lessons complete — more unlock as notes are finished.' : 'Keep going — '+(o-n)+' available lesson'+((o-n)===1?'':'s')+' left.')
    : 'No lessons are playable yet.';
}
refreshLearner();

el('expandall').onclick = ()=>document.querySelectorAll('details.phase').forEach(d=>d.open=true);
el('collapseall').onclick = ()=>document.querySelectorAll('details.phase').forEach(d=>d.open=false);
el('resetprog').onclick = ()=>{ if(confirm('Reset your lesson progress on this device?')){ done=new Set(); saveDone(done); document.querySelectorAll('.done input').forEach(c=>c.checked=false); refreshLearner(); } };

el('foot').textContent = 'Generated '+DATA.generated+' · '+DATA.total+' lessons across '+DATA.phases.length+' phases · built from the Obsidian knowledge base.';
</script>
