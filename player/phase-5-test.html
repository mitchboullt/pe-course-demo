<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Phase Test — Interactive Course</title>
<style>
  :root { --bg:#0f1419; --panel:#1a212b; --line:#2a3543; --ink:#e6edf3; --mut:#8b98a8;
          --accent:#4f9cf9; --good:#3fb950; --bad:#f85149; --warn:#d29922; }
  * { box-sizing:border-box; }
  body { margin:0; font:15px/1.6 -apple-system,Segoe UI,Roboto,sans-serif; background:var(--bg); color:var(--ink); }
  .top { display:flex; align-items:center; gap:14px; padding:14px 22px; border-bottom:1px solid var(--line);
         position:sticky; top:0; background:rgba(15,20,25,.94); backdrop-filter:blur(6px); z-index:10; }
  .top a.home { color:var(--mut); text-decoration:none; font-size:13px; }
  .top a.home:hover { color:var(--accent); }
  .top .title { font-weight:700; flex:1; font-size:15px; }
  .top .score { font-size:13px; color:var(--mut); }
  .wrap { max-width:820px; margin:0 auto; padding:26px 22px 90px; }
  h1 { font-size:24px; margin:0 0 6px; }
  .intro { color:var(--mut); background:var(--panel); border:1px solid var(--line); border-radius:12px; padding:16px 18px; margin:16px 0 26px; }
  .q { background:var(--panel); border:1px solid var(--line); border-radius:12px; padding:18px 20px; margin:14px 0; }
  .q.unanswered.flagged { border-color:var(--warn); }
  .qh { font-weight:600; margin-bottom:12px; }
  .qh .n { color:var(--accent); margin-right:8px; }
  .opt { display:flex; gap:10px; align-items:flex-start; padding:10px 12px; border:1px solid var(--line); border-radius:9px;
         margin:7px 0; cursor:pointer; transition:background .12s,border-color .12s; }
  .opt:hover { background:#10161e; }
  .opt.sel { border-color:var(--accent); background:rgba(79,156,249,.10); }
  .opt .let { font-weight:700; color:var(--mut); flex:none; width:20px; }
  .opt.sel .let { color:var(--accent); }
  .graded .opt { cursor:default; }
  .graded .opt.correct { border-color:var(--good); background:rgba(63,185,80,.12); }
  .graded .opt.correct .let { color:var(--good); }
  .graded .opt.wrongpick { border-color:var(--bad); background:rgba(248,81,73,.12); }
  .graded .opt.wrongpick .let { color:var(--bad); }
  .expl { display:none; margin-top:12px; padding:11px 13px; border-left:3px solid var(--accent);
          background:#0c1117; border-radius:0 8px 8px 0; color:#c9d4e0; font-size:14px; }
  .graded .expl { display:block; }
  .expl.ok { border-left-color:var(--good); }
  .expl.no { border-left-color:var(--bad); }
  .bar { position:fixed; left:0; right:0; bottom:0; background:rgba(15,20,25,.97); border-top:1px solid var(--line);
         padding:12px 22px; display:flex; align-items:center; gap:16px; }
  .bar .status { flex:1; color:var(--mut); font-size:13.5px; }
  button { font:inherit; font-weight:600; cursor:pointer; border:0; border-radius:9px; padding:11px 20px; }
  #submit { background:var(--good); color:#fff; }
  #submit:disabled { background:#39414d; color:#8b98a8; cursor:not-allowed; }
  #retry { background:var(--panel); color:var(--ink); border:1px solid var(--line); display:none; }
  .result { display:none; text-align:center; padding:22px; border-radius:14px; margin:8px 0 22px; font-size:16px; }
  .result.pass { background:rgba(63,185,80,.12); border:1px solid rgba(63,185,80,.4); }
  .result.fail { background:rgba(210,153,34,.12); border:1px solid rgba(210,153,34,.4); }
  .result .big { font-size:34px; font-weight:800; display:block; margin-bottom:4px; }
</style>
</head>
<body>
<div id="pe-gate" style="position:fixed;inset:0;z-index:2147483647;background:#0d1117;display:flex;align-items:center;justify-content:center;font-family:system-ui,-apple-system,Segoe UI,Roboto,sans-serif">
  <div style="background:#161b22;border:1px solid #30363d;border-radius:14px;padding:30px 32px;max-width:360px;width:88%;text-align:center;color:#e6edf3;box-shadow:0 12px 40px rgba(0,0,0,.5)">
    <div style="font-size:21px;font-weight:700;margin-bottom:6px">Private Equity Course</div>
    <div style="color:#8b949e;font-size:13.5px;margin-bottom:18px">Enter your access code to continue.</div>
    <input id="pe-gate-input" type="password" placeholder="Access code" autocomplete="off"
      style="width:100%;box-sizing:border-box;padding:11px 12px;border-radius:8px;border:1px solid #30363d;background:#0d1117;color:#e6edf3;font-size:15px;outline:none">
    <div id="pe-gate-err" style="color:#f85149;font-size:12.5px;height:15px;margin:8px 0 2px"></div>
    <button id="pe-gate-btn" style="width:100%;padding:11px;border:0;border-radius:8px;background:#238636;color:#fff;font-size:15px;font-weight:600;cursor:pointer">Enter</button>
  </div>
</div>
<script>
(function(){
  var HASH="2ab47ce2424d6043168f930c79e3931f57f9e86ad33a8e35c2e9b6d3f1444924";
  var g=document.getElementById('pe-gate');
  if(localStorage.getItem('pe_demo_ok')==='1'){ g.remove(); return; }
  document.documentElement.style.overflow='hidden';
  var inp=document.getElementById('pe-gate-input'), err=document.getElementById('pe-gate-err');
  try{ inp.focus(); }catch(e){}
  async function sha(s){ var b=await crypto.subtle.digest('SHA-256', new TextEncoder().encode(s)); return Array.from(new Uint8Array(b)).map(function(x){return x.toString(16).padStart(2,'0');}).join(''); }
  async function submit(){
    var v=inp.value; if(!v) return;
    var h; try{ h=await sha(v); }catch(e){ err.textContent='Browser too old'; return; }
    if(h===HASH){ localStorage.setItem('pe_demo_ok','1'); localStorage.setItem('pe_demo_code',v); document.documentElement.style.overflow=''; g.remove(); }
    else { err.textContent='Incorrect code'; inp.value=''; inp.focus(); }
  }
  document.getElementById('pe-gate-btn').onclick=submit;
  inp.addEventListener('keydown', function(e){ if(e.key==='Enter') submit(); });
})();
</script>
<div class="top">
  <a class="home" href="../index.html">☰ All lessons</a>
  <span class="title" id="ttitle"></span>
  <span class="score" id="tscore"></span>
</div>
<div class="wrap">
  <h1 id="h1"></h1>
  <div class="intro" id="intro"></div>
  <div class="result" id="result"></div>
  <div id="questions"></div>
</div>
<div class="bar">
  <span class="status" id="status"></span>
  <button id="retry">Retry</button>
  <button id="submit">Submit test</button>
</div>
<script>
const DATA = {"phase": "5", "title": "Phase 5 Test — Value Creation", "pass_mark": 20, "questions": [{"n": 1, "prompt": "The three broad categories of PE value creation are usually described as:", "options": {"A": "Fees, carry, and hurdle", "B": "Operational improvement, multiple expansion, and financial (leverage/deleveraging)", "C": "Sourcing, diligence, and exit", "D": "Debt, equity, and mezzanine"}, "answer": "B", "explanation": "Operational, multiple expansion, and financial are the three categories."}, {"n": 2, "prompt": "The 100-day plan is:", "options": {"A": "A legal document filed at closing", "B": "A prioritised post-acquisition action plan to capture early value and set the agenda for the hold", "C": "The exit process timeline", "D": "The fund's fundraising schedule"}, "answer": "B", "explanation": "The 100-day plan is the prioritised early-value action plan."}, {"n": 3, "prompt": "EBITDA margin improvement is driven by:", "options": {"A": "Only revenue growth", "B": "Growing revenue faster than costs, or cutting costs — expanding EBITDA as a share of revenue", "C": "Increasing leverage", "D": "Reducing the entry multiple"}, "answer": "B", "explanation": "Margin improvement = growing revenue faster than costs, or cutting costs."}, {"n": 4, "prompt": "Why is pricing often called the highest-leverage margin lever?", "options": {"A": "Price changes require large capital investment", "B": "A small price increase can flow almost entirely to EBITDA, with little added cost", "C": "Pricing has no effect on margins", "D": "Pricing only affects working capital"}, "answer": "B", "explanation": "A price rise flows almost fully to EBITDA with little added cost — high leverage."}, {"n": 5, "prompt": "Working capital optimisation improves the business by:", "options": {"A": "Increasing EBITDA directly", "B": "Freeing up cash tied in receivables, inventory, and payables — improving cash flow and reducing debt", "C": "Raising the exit multiple automatically", "D": "Reducing revenue"}, "answer": "B", "explanation": "Working-capital optimisation frees cash from receivables/inventory/payables."}, {"n": 6, "prompt": "Which action reduces working capital (releases cash)?", "options": {"A": "Extending customer payment terms (collecting later)", "B": "Collecting receivables faster and negotiating longer payables", "C": "Building more inventory", "D": "Paying suppliers earlier"}, "answer": "B", "explanation": "Collect receivables faster + pay suppliers later releases cash."}, {"n": 7, "prompt": "A \"buy-and-build\" (platform + add-ons) strategy creates value primarily through:", "options": {"A": "Selling the platform immediately", "B": "Acquiring smaller companies to build scale, capture synergies, and often benefit from multiple arbitrage", "C": "Reducing leverage to zero", "D": "Avoiding all acquisitions"}, "answer": "B", "explanation": "Buy-and-build builds scale, synergies, and multiple arbitrage via add-ons."}, {"n": 8, "prompt": "\"Multiple arbitrage\" in buy-and-build means:", "options": {"A": "Buying add-ons at lower multiples than the platform's exit multiple, raising blended value", "B": "Paying the same multiple for every deal", "C": "Selling at a lower multiple than paid", "D": "Arbitraging interest rates"}, "answer": "A", "explanation": "Multiple arbitrage = buying add-ons cheaper than the platform's exit multiple."}, {"n": 9, "prompt": "A management incentive plan (MIP) is designed to:", "options": {"A": "Guarantee management a fixed salary regardless of performance", "B": "Align management's financial upside with equity value creation, typically via equity/options", "C": "Replace the GP's carry", "D": "Pay LPs directly"}, "answer": "B", "explanation": "MIPs align management upside with equity value, usually via equity/options."}, {"n": 10, "prompt": "\"Sweet equity\" for management refers to:", "options": {"A": "The GP's carried interest", "B": "Equity that gives management outsized upside relative to their investment if the deal performs", "C": "Senior debt held by management", "D": "A guaranteed bonus"}, "answer": "B", "explanation": "Sweet equity gives management outsized upside relative to their investment."}, {"n": 11, "prompt": "Which is an *operational* (not financial) value-creation lever?", "options": {"A": "Refinancing debt at a lower rate", "B": "Improving procurement to lower input costs", "C": "Paying down acquisition debt", "D": "Using more leverage"}, "answer": "B", "explanation": "Procurement/cost improvement is operational; the others are financial."}, {"n": 12, "prompt": "A company raises prices 3% with volumes roughly unchanged. On $200m revenue, the approximate EBITDA uplift (before minimal added cost) is:", "options": {"A": "~$0.6m", "B": "~$6m", "C": "~$60m", "D": "$200m"}, "answer": "B", "explanation": "3% × $200m ≈ $6m of near-pure EBITDA uplift."}, {"n": 13, "prompt": "Why does PE typically act fast in the first 100 days?", "options": {"A": "Because the LPA requires it by law", "B": "To build momentum, signal urgency, and capture value while the mandate for change is strongest", "C": "Because debt must be repaid within 100 days", "D": "To avoid paying management fees"}, "answer": "B", "explanation": "Early speed builds momentum and captures value while the change mandate is strongest."}, {"n": 14, "prompt": "Which best describes the relationship between value creation and returns?", "options": {"A": "Value creation is unrelated to IRR/MOIC", "B": "Operational improvements flow through EBITDA growth (and cash for deleveraging) into higher IRR and MOIC", "C": "Only leverage affects returns", "D": "Returns depend solely on the entry multiple"}, "answer": "B", "explanation": "Operational gains flow through EBITDA growth and deleveraging into higher IRR/MOIC."}, {"n": 15, "prompt": "A risk of aggressive cost-cutting as a value lever is that it can:", "options": {"A": "Never harm the business", "B": "Damage capability, service, or growth if cut too deep — undermining exit value", "C": "Automatically raise the exit multiple", "D": "Reduce leverage to zero"}, "answer": "B", "explanation": "Over-cutting can damage capability/service/growth and hurt exit value."}, {"n": 16, "prompt": "In buy-and-build, integration risk means:", "options": {"A": "The platform cannot be sold", "B": "Acquired businesses may be hard to combine (systems, culture, operations), eroding expected synergies", "C": "Multiples always contract", "D": "Debt cannot be raised"}, "answer": "B", "explanation": "Integration risk = difficulty combining acquired businesses, eroding synergies."}, {"n": 17, "prompt": "Days Sales Outstanding (DSO) measures:", "options": {"A": "How long inventory sits unsold", "B": "How long, on average, it takes to collect cash from customers", "C": "How long payables are outstanding", "D": "The hold period"}, "answer": "B", "explanation": "DSO measures average days to collect cash from customers."}, {"n": 18, "prompt": "Reducing DSO from 60 to 45 days, all else equal, will:", "options": {"A": "Tie up more cash", "B": "Release cash previously locked in receivables", "C": "Increase EBITDA margin directly", "D": "Raise the entry multiple"}, "answer": "B", "explanation": "Lower DSO releases cash previously tied in receivables."}, {"n": 19, "prompt": "A revenue-side value lever (as opposed to cost-side) is:", "options": {"A": "Headcount reduction", "B": "Cross-selling and pricing optimisation to grow the top line profitably", "C": "Renegotiating supplier contracts", "D": "Cutting overhead"}, "answer": "B", "explanation": "Cross-selling and pricing are revenue-side levers."}, {"n": 20, "prompt": "Management typically invests its own money alongside the sponsor because:", "options": {"A": "The LPA forbids it", "B": "\"Skin in the game\" strengthens alignment and sharpens incentives to hit the plan", "C": "It replaces the need for a MIP", "D": "It guarantees a bonus"}, "answer": "B", "explanation": "Management co-investment (\"skin in the game\") strengthens alignment."}, {"n": 21, "prompt": "Which is the clearest example of *financial* value creation?", "options": {"A": "Launching a new product line", "B": "Using operating cash flow to pay down acquisition debt over the hold", "C": "Improving factory throughput", "D": "Raising prices"}, "answer": "B", "explanation": "Paying down acquisition debt with operating cash is financial value creation."}, {"n": 22, "prompt": "A platform acquires five add-ons at ~6x EBITDA each and later exits the enlarged group at 10x. This illustrates:", "options": {"A": "Margin contraction", "B": "Multiple arbitrage plus scale benefits", "C": "A dividend recap", "D": "Working-capital release"}, "answer": "B", "explanation": "Buying add-ons cheap and exiting the group high = multiple arbitrage plus scale."}, {"n": 23, "prompt": "The 100-day plan is most effective when it is:", "options": {"A": "A vague aspiration with no owners or deadlines", "B": "Specific, prioritised, resourced, and tied to accountable owners and metrics", "C": "Kept secret from management", "D": "Focused only on the exit"}, "answer": "B", "explanation": "Effective 100-day plans are specific, prioritised, resourced, and owned."}, {"n": 24, "prompt": "Which combination of levers is generally regarded as producing the most durable value?", "options": {"A": "Leverage alone", "B": "Sustainable revenue growth and margin/operational improvement", "C": "Multiple expansion from market timing only", "D": "Cutting all investment"}, "answer": "B", "explanation": "Sustainable revenue growth plus operational improvement is the most durable."}, {"n": 25, "prompt": "A vesting schedule with a \"cliff\" in a MIP means management:", "options": {"A": "Vests all equity immediately at closing", "B": "Earns no vested equity until a minimum period passes, then vests in steps — encouraging retention", "C": "Loses all equity at exit", "D": "Is paid in cash only"}, "answer": "B", "explanation": "A cliff delays initial vesting, then vests in steps, aiding retention."}]};
const LS = 'pe-test::'+DATA.phase;
const el = id => document.getElementById(id);
const LETTERS = ['A','B','C','D'];
let picks = {};   // n -> letter
let graded = false;

el('ttitle').textContent = DATA.title;
el('h1').textContent = DATA.title;
el('intro').innerHTML = DATA.questions.length+' multiple-choice questions. Choose one answer per question, then press '+
  '<b>Submit test</b>. You need <b>'+DATA.pass_mark+'/'+DATA.questions.length+'</b> ('+
  Math.round(DATA.pass_mark/DATA.questions.length*100)+'%) to pass. Answers and explanations reveal on submit.';

const qwrap = el('questions');
DATA.questions.forEach(q=>{
  const card = document.createElement('div');
  card.className='q unanswered'; card.id='q'+q.n;
  // Shuffle options so the correct choice isn't positionally predictable
  // (authored keys cluster on one letter). Remap to fresh display letters and
  // record the correct display letter on the question.
  let entries = LETTERS.filter(L=>q.options[L]).map(L=>({orig:L, text:q.options[L]}));
  for(let i=entries.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); const t=entries[i]; entries[i]=entries[j]; entries[j]=t; }
  let opts = '';
  entries.forEach((e,idx)=>{
    const D = LETTERS[idx];
    if(e.orig===q.answer) q._correct = D;
    opts += '<div class="opt" data-n="'+q.n+'" data-l="'+D+'"><span class="let">'+D+'</span><span>'+e.text+'</span></div>';
  });
  card.innerHTML = '<div class="qh"><span class="n">Q'+q.n+'</span>'+q.prompt+'</div>'+opts+
    '<div class="expl" id="expl'+q.n+'"></div>';
  qwrap.appendChild(card);
});

qwrap.addEventListener('click', e=>{
  if(graded) return;
  const opt = e.target.closest('.opt'); if(!opt) return;
  const n = opt.dataset.n, L = opt.dataset.l;
  picks[n] = L;
  const card = el('q'+n);
  card.classList.remove('unanswered');
  card.querySelectorAll('.opt').forEach(o=>o.classList.toggle('sel', o.dataset.l===L));
  updateStatus();
});

function updateStatus(){
  const done = Object.keys(picks).length, total = DATA.questions.length;
  el('status').textContent = graded ? '' : done+' of '+total+' answered'+(done<total?'':' — ready to submit');
}
updateStatus();

el('submit').onclick = ()=>{
  const total = DATA.questions.length, done = Object.keys(picks).length;
  if(done<total){
    const miss = DATA.questions.filter(q=>!picks[q.n]);
    if(!confirm(done+' of '+total+' answered. '+(total-done)+' left blank will be marked wrong. Submit anyway?')){
      miss.forEach(q=>{ const c=el('q'+q.n); c.classList.add('flagged'); });
      if(miss[0]) el('q'+miss[0].n).scrollIntoView({behavior:'smooth',block:'center'});
      return;
    }
  }
  grade();
};

function grade(){
  graded = true;
  let correct = 0;
  DATA.questions.forEach(q=>{
    const card = el('q'+q.n); card.classList.add('graded');
    const pick = picks[q.n];
    const ans = q._correct;   // display letter of the correct option (post-shuffle)
    if(pick===ans) correct++;
    card.querySelectorAll('.opt').forEach(o=>{
      const L=o.dataset.l;
      if(L===ans) o.classList.add('correct');
      if(L===pick && pick!==ans) o.classList.add('wrongpick');
    });
    const ex = el('expl'+q.n);
    const got = pick===ans;
    ex.className = 'expl '+(got?'ok':'no');
    ex.innerHTML = '<b>'+(got?'Correct':(pick?'Not quite':'No answer'))+' — answer '+ans+'.</b> '+(q.explanation||'');
  });
  const total = DATA.questions.length, pct = Math.round(correct/total*100);
  const pass = correct>=DATA.pass_mark;
  const r = el('result');
  r.className = 'result '+(pass?'pass':'fail'); r.style.display='block';
  r.innerHTML = '<span class="big">'+correct+' / '+total+'  ·  '+pct+'%</span>'+
    (pass ? 'Passed — you cleared this phase. Review any misses, then continue to the next phase.'
          : 'Below the '+DATA.pass_mark+'/'+total+' pass mark. Review the explanations and the linked notes, then retake cold.');
  el('tscore').textContent = correct+'/'+total+' ('+pct+'%)';
  el('status').textContent = 'Scored '+correct+'/'+total+'. Scroll to review explanations.';
  el('submit').disabled = true; el('submit').style.display='none';
  el('retry').style.display='inline-block';
  try {
    const prev = JSON.parse(localStorage.getItem(LS)||'{}');
    localStorage.setItem(LS, JSON.stringify({best: Math.max(correct, prev.best||0), last: correct, total: total}));
  } catch(e){}
  window.scrollTo({top:0, behavior:'smooth'});
}

el('retry').onclick = ()=>{
  graded=false; picks={};
  el('result').style.display='none';
  el('tscore').textContent='';
  el('submit').disabled=false; el('submit').style.display='inline-block';
  el('retry').style.display='none';
  document.querySelectorAll('.q').forEach(c=>{ c.className='q unanswered'; });
  document.querySelectorAll('.opt').forEach(o=>o.classList.remove('sel','correct','wrongpick'));
  updateStatus();
  window.scrollTo({top:0, behavior:'smooth'});
};

try {
  const s = JSON.parse(localStorage.getItem(LS)||'{}');
  if(s.best!=null) el('tscore').textContent = 'Best: '+s.best+'/'+s.total;
} catch(e){}
</script>
</body>
</html>
