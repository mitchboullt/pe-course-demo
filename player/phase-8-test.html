<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Phase Test — Interactive Course</title>
<style>
  :root { --bg:#0f1419; --panel:#1a212b; --line:#2a3543; --ink:#e6edf3; --mut:#8b98a8;
          --accent:#4f9cf9; --good:#3fb950; --bad:#f85149; --warn:#d29922; }
  * { box-sizing:border-box; }
  body { margin:0; font:15px/1.6 -apple-system,Segoe UI,Roboto,sans-serif; background:var(--bg); color:var(--ink); }
  .top { display:flex; align-items:center; gap:14px; padding:14px 22px; border-bottom:1px solid var(--line);
         position:sticky; top:0; background:rgba(15,20,25,.94); backdrop-filter:blur(6px); z-index:10; }
  .top a.home { color:var(--mut); text-decoration:none; font-size:13px; }
  .top a.home:hover { color:var(--accent); }
  .top .title { font-weight:700; flex:1; font-size:15px; }
  .top .score { font-size:13px; color:var(--mut); }
  .wrap { max-width:820px; margin:0 auto; padding:26px 22px 90px; }
  h1 { font-size:24px; margin:0 0 6px; }
  .intro { color:var(--mut); background:var(--panel); border:1px solid var(--line); border-radius:12px; padding:16px 18px; margin:16px 0 26px; }
  .q { background:var(--panel); border:1px solid var(--line); border-radius:12px; padding:18px 20px; margin:14px 0; }
  .q.unanswered.flagged { border-color:var(--warn); }
  .qh { font-weight:600; margin-bottom:12px; }
  .qh .n { color:var(--accent); margin-right:8px; }
  .opt { display:flex; gap:10px; align-items:flex-start; padding:10px 12px; border:1px solid var(--line); border-radius:9px;
         margin:7px 0; cursor:pointer; transition:background .12s,border-color .12s; }
  .opt:hover { background:#10161e; }
  .opt.sel { border-color:var(--accent); background:rgba(79,156,249,.10); }
  .opt .let { font-weight:700; color:var(--mut); flex:none; width:20px; }
  .opt.sel .let { color:var(--accent); }
  .graded .opt { cursor:default; }
  .graded .opt.correct { border-color:var(--good); background:rgba(63,185,80,.12); }
  .graded .opt.correct .let { color:var(--good); }
  .graded .opt.wrongpick { border-color:var(--bad); background:rgba(248,81,73,.12); }
  .graded .opt.wrongpick .let { color:var(--bad); }
  .expl { display:none; margin-top:12px; padding:11px 13px; border-left:3px solid var(--accent);
          background:#0c1117; border-radius:0 8px 8px 0; color:#c9d4e0; font-size:14px; }
  .graded .expl { display:block; }
  .expl.ok { border-left-color:var(--good); }
  .expl.no { border-left-color:var(--bad); }
  .bar { position:fixed; left:0; right:0; bottom:0; background:rgba(15,20,25,.97); border-top:1px solid var(--line);
         padding:12px 22px; display:flex; align-items:center; gap:16px; }
  .bar .status { flex:1; color:var(--mut); font-size:13.5px; }
  button { font:inherit; font-weight:600; cursor:pointer; border:0; border-radius:9px; padding:11px 20px; }
  #submit { background:var(--good); color:#fff; }
  #submit:disabled { background:#39414d; color:#8b98a8; cursor:not-allowed; }
  #retry { background:var(--panel); color:var(--ink); border:1px solid var(--line); display:none; }
  .result { display:none; text-align:center; padding:22px; border-radius:14px; margin:8px 0 22px; font-size:16px; }
  .result.pass { background:rgba(63,185,80,.12); border:1px solid rgba(63,185,80,.4); }
  .result.fail { background:rgba(210,153,34,.12); border:1px solid rgba(210,153,34,.4); }
  .result .big { font-size:34px; font-weight:800; display:block; margin-bottom:4px; }
</style>
</head>
<body>
<div id="pe-gate" style="position:fixed;inset:0;z-index:2147483647;background:#0d1117;display:flex;align-items:center;justify-content:center;font-family:system-ui,-apple-system,Segoe UI,Roboto,sans-serif">
  <div style="background:#161b22;border:1px solid #30363d;border-radius:14px;padding:30px 32px;max-width:360px;width:88%;text-align:center;color:#e6edf3;box-shadow:0 12px 40px rgba(0,0,0,.5)">
    <div style="font-size:21px;font-weight:700;margin-bottom:6px">Private Equity Course</div>
    <div style="color:#8b949e;font-size:13.5px;margin-bottom:18px">Enter your access code to continue.</div>
    <input id="pe-gate-input" type="password" placeholder="Access code" autocomplete="off"
      style="width:100%;box-sizing:border-box;padding:11px 12px;border-radius:8px;border:1px solid #30363d;background:#0d1117;color:#e6edf3;font-size:15px;outline:none">
    <div id="pe-gate-err" style="color:#f85149;font-size:12.5px;height:15px;margin:8px 0 2px"></div>
    <button id="pe-gate-btn" style="width:100%;padding:11px;border:0;border-radius:8px;background:#238636;color:#fff;font-size:15px;font-weight:600;cursor:pointer">Enter</button>
  </div>
</div>
<script>
(function(){
  var HASH="2ab47ce2424d6043168f930c79e3931f57f9e86ad33a8e35c2e9b6d3f1444924";
  var g=document.getElementById('pe-gate');
  if(localStorage.getItem('pe_demo_ok')==='1'){ g.remove(); return; }
  document.documentElement.style.overflow='hidden';
  var inp=document.getElementById('pe-gate-input'), err=document.getElementById('pe-gate-err');
  try{ inp.focus(); }catch(e){}
  async function sha(s){ var b=await crypto.subtle.digest('SHA-256', new TextEncoder().encode(s)); return Array.from(new Uint8Array(b)).map(function(x){return x.toString(16).padStart(2,'0');}).join(''); }
  async function submit(){
    var v=inp.value; if(!v) return;
    var h; try{ h=await sha(v); }catch(e){ err.textContent='Browser too old'; return; }
    if(h===HASH){ localStorage.setItem('pe_demo_ok','1'); localStorage.setItem('pe_demo_code',v); document.documentElement.style.overflow=''; g.remove(); }
    else { err.textContent='Incorrect code'; inp.value=''; inp.focus(); }
  }
  document.getElementById('pe-gate-btn').onclick=submit;
  inp.addEventListener('keydown', function(e){ if(e.key==='Enter') submit(); });
})();
</script>
<div class="top">
  <a class="home" href="../index.html">☰ All lessons</a>
  <span class="title" id="ttitle"></span>
  <span class="score" id="tscore"></span>
</div>
<div class="wrap">
  <h1 id="h1"></h1>
  <div class="intro" id="intro"></div>
  <div class="result" id="result"></div>
  <div id="questions"></div>
</div>
<div class="bar">
  <span class="status" id="status"></span>
  <button id="retry">Retry</button>
  <button id="submit">Submit test</button>
</div>
<script>
const DATA = {"phase": "8", "title": "Phase 8 Test — Due Diligence", "pass_mark": 20, "questions": [{"n": 1, "prompt": "Commercial due diligence (CDD) primarily validates:", "options": {"A": "The company's tax filings", "B": "Market size/growth, competitive position, and the demand-side thesis", "C": "The legal ownership of IP", "D": "The accuracy of the debt schedule"}, "answer": "B", "explanation": "CDD validates market size/growth, competitive position, and demand-side thesis."}, {"n": 2, "prompt": "Financial due diligence (FDD) focuses most on:", "options": {"A": "Marketing strategy", "B": "Earnings quality and a defensible, normalised EBITDA", "C": "Environmental permits", "D": "Board composition"}, "answer": "B", "explanation": "FDD centres on earnings quality and a defensible normalised EBITDA."}, {"n": 3, "prompt": "\"Quality of earnings\" (QoE) analysis exists to:", "options": {"A": "Inflate reported EBITDA", "B": "Identify one-off, non-recurring, or aggressive items so buyers see sustainable earnings", "C": "Replace the audit", "D": "Compute carried interest"}, "answer": "B", "explanation": "QoE isolates one-off/aggressive items to reveal sustainable earnings."}, {"n": 4, "prompt": "A normalisation adjustment in FDD would typically:", "options": {"A": "Add back a genuinely recurring operating cost", "B": "Remove a one-time legal settlement to reflect ongoing earnings", "C": "Increase reported revenue arbitrarily", "D": "Change the entry multiple directly"}, "answer": "B", "explanation": "Normalisation removes a one-time item (e.g., a legal settlement) to reflect ongoing earnings."}, {"n": 5, "prompt": "Legal due diligence chiefly checks:", "options": {"A": "Market growth rates", "B": "Contracts, corporate structure, litigation, IP ownership, and regulatory/compliance exposure", "C": "Customer satisfaction scores", "D": "EBITDA margins"}, "answer": "B", "explanation": "Legal DD checks contracts, structure, litigation, IP, and compliance."}, {"n": 6, "prompt": "A \"change of control\" clause discovered in legal DD matters because:", "options": {"A": "It has no effect on the deal", "B": "A key contract could terminate or reprice when ownership changes, threatening value", "C": "It increases EBITDA", "D": "It reduces leverage"}, "answer": "B", "explanation": "Change-of-control clauses can terminate/reprice contracts when ownership changes."}, {"n": 7, "prompt": "Management team assessment is often framed with the \"5 Cs.\" These evaluate the team's:", "options": {"A": "Cash, credit, collateral, capacity, conditions", "B": "Character, capability, and related dimensions of the leadership team", "C": "Comps, coverage, covenants, capex, carry", "D": "Commercial, cyclical, capital, cost, culture"}, "answer": "B", "explanation": "The 5 Cs assess character, capability, and related leadership dimensions."}, {"n": 8, "prompt": "Why does PE weigh management quality so heavily?", "options": {"A": "Management is irrelevant post-close", "B": "The team executes the value-creation plan; weak management is a top cause of underperformance", "C": "Only the GP runs the company", "D": "Management sets the entry multiple"}, "answer": "B", "explanation": "Management executes the plan; weak teams are a leading cause of underperformance."}, {"n": 9, "prompt": "ESG due diligence in Europe often references SFDR because it:", "options": {"A": "Governs interest rate hedging", "B": "Classifies funds by sustainability disclosure (e.g., Article 6/8/9) and drives ESG data requirements", "C": "Sets the hurdle rate", "D": "Regulates carried interest"}, "answer": "B", "explanation": "SFDR classifies funds by sustainability disclosure and drives ESG data needs."}, {"n": 10, "prompt": "A \"Phase 1\" environmental assessment is:", "options": {"A": "A full soil remediation", "B": "An initial, largely desk-based review to identify potential contamination risks", "C": "A financial audit", "D": "A legal opinion on IP"}, "answer": "B", "explanation": "Phase 1 is an initial, desk-based environmental screen."}, {"n": 11, "prompt": "Customer concentration is a red flag because:", "options": {"A": "It always increases value", "B": "Losing one large customer could sharply reduce revenue and EBITDA", "C": "It reduces working capital", "D": "It has no bearing on risk"}, "answer": "B", "explanation": "Customer concentration risks a revenue/EBITDA cliff if a big client leaves."}, {"n": 12, "prompt": "Diligence uncovers that reported EBITDA includes $4m of non-recurring gains. The buyer should:", "options": {"A": "Raise the offer price", "B": "Reduce the EBITDA base (and thus the price at a given multiple)", "C": "Ignore it", "D": "Increase leverage"}, "answer": "B", "explanation": "Strip the $4m non-recurring gain from EBITDA, lowering price at a given multiple."}, {"n": 13, "prompt": "The main purpose of due diligence is to:", "options": {"A": "Delay the deal indefinitely", "B": "Validate the investment thesis, price risk, and shape terms — or walk away", "C": "Replace the SPA", "D": "Guarantee returns"}, "answer": "B", "explanation": "DD validates the thesis, prices risk, shapes terms, or supports a walk."}, {"n": 14, "prompt": "A DD finding that a key liability exists but is quantifiable is often addressed by:", "options": {"A": "Ignoring it", "B": "A price reduction, a specific indemnity, or an escrow/holdback in the SPA", "C": "Increasing the entry multiple", "D": "Adding it to EBITDA"}, "answer": "B", "explanation": "Quantifiable liabilities are handled via price cut, indemnity, or escrow/holdback."}, {"n": 15, "prompt": "Which is a classic *commercial* red flag?", "options": {"A": "A pending tax audit", "B": "A structurally declining end-market or eroding competitive moat", "C": "An expired environmental permit", "D": "A weak CFO"}, "answer": "B", "explanation": "A declining end-market/eroding moat is a commercial red flag."}, {"n": 16, "prompt": "Which is a classic *financial* red flag?", "options": {"A": "Aggressive revenue recognition or deteriorating cash conversion", "B": "A shrinking addressable market", "C": "A missing IP assignment", "D": "High staff turnover"}, "answer": "A", "explanation": "Aggressive revenue recognition/weak cash conversion is a financial red flag."}, {"n": 17, "prompt": "\"Working capital peg / target\" in the SPA is informed by FDD to:", "options": {"A": "Fix the management fee", "B": "Ensure the business is delivered with a normal level of working capital, avoiding value leakage at close", "C": "Set the exit multiple", "D": "Determine ESG classification"}, "answer": "B", "explanation": "The working-capital peg delivers normal working capital at close, preventing leakage."}, {"n": 18, "prompt": "Vendor due diligence (VDD) is:", "options": {"A": "Diligence commissioned by the seller and shared with bidders to streamline the process", "B": "Diligence on the company's vendors only", "C": "Always done by the buyer's lenders", "D": "A legal opinion"}, "answer": "A", "explanation": "VDD is seller-commissioned diligence shared with bidders."}, {"n": 19, "prompt": "A red flag that most often justifies *walking away* (rather than repricing) is:", "options": {"A": "A modest, quantifiable warranty claim", "B": "A fundamental thesis breaker — e.g., the core market is structurally collapsing or fraud is suspected", "C": "A small working-capital adjustment", "D": "A minor permit renewal"}, "answer": "B", "explanation": "A thesis-breaker (market collapse, suspected fraud) justifies walking."}, {"n": 20, "prompt": "ESG issues can affect value at exit because:", "options": {"A": "They never matter to buyers", "B": "Future buyers and lenders increasingly screen ESG; poor ESG can shrink the buyer pool or the multiple", "C": "They only affect the entry multiple", "D": "They reduce leverage automatically"}, "answer": "B", "explanation": "Future buyers/lenders screen ESG; poor ESG can shrink the buyer pool or multiple."}, {"n": 21, "prompt": "Diligence on \"add-backs\" to EBITDA requires scepticism because:", "options": {"A": "Add-backs always understate earnings", "B": "Sellers may present optimistic or non-repeatable \"run-rate\"/synergy add-backs that inflate the base", "C": "Add-backs reduce the purchase price", "D": "Add-backs are prohibited"}, "answer": "B", "explanation": "Optimistic run-rate/synergy add-backs can inflate the EBITDA base."}, {"n": 22, "prompt": "Confirmatory diligence differs from early-stage diligence in that it:", "options": {"A": "Happens before any bid", "B": "Occurs late (often in exclusivity) to verify specific findings before signing", "C": "Replaces the CIM", "D": "Is done only after closing"}, "answer": "B", "explanation": "Confirmatory diligence is late-stage verification before signing."}, {"n": 23, "prompt": "Which sequence correctly maps a finding to a deal outcome?", "options": {"A": "Red flag → always walk away", "B": "Finding → assess materiality → reprice, restructure terms (indemnity/escrow), or walk", "C": "Finding → raise the offer", "D": "Finding → ignore and proceed"}, "answer": "B", "explanation": "Finding → materiality → reprice/restructure/walk is the disciplined chain."}, {"n": 24, "prompt": "A \"material adverse change\" (MAC) clause protects the buyer by:", "options": {"A": "Guaranteeing a price increase", "B": "Allowing the buyer to walk (or renegotiate) if a defined serious deterioration occurs before close", "C": "Fixing the hurdle rate", "D": "Adding to EBITDA"}, "answer": "B", "explanation": "A MAC clause lets the buyer walk or renegotiate on defined serious deterioration."}, {"n": 25, "prompt": "Integrating the four workstreams, the disciplined DD verdict for a target with a strong market (CDD), clean earnings (FDD), one quantifiable legal liability, and a capable-but-thin management team is best expressed as:", "options": {"A": "Walk away immediately", "B": "Pursue, but reflect the legal liability in price/indemnity and build a management-strengthening plan", "C": "Pay full price and ignore the gaps", "D": "Increase leverage to offset the risks"}, "answer": "B", "explanation": "Pursue while pricing the liability and strengthening the thin management team."}]};
const LS = 'pe-test::'+DATA.phase;
const el = id => document.getElementById(id);
const LETTERS = ['A','B','C','D'];
let picks = {};   // n -> letter
let graded = false;

el('ttitle').textContent = DATA.title;
el('h1').textContent = DATA.title;
el('intro').innerHTML = DATA.questions.length+' multiple-choice questions. Choose one answer per question, then press '+
  '<b>Submit test</b>. You need <b>'+DATA.pass_mark+'/'+DATA.questions.length+'</b> ('+
  Math.round(DATA.pass_mark/DATA.questions.length*100)+'%) to pass. Answers and explanations reveal on submit.';

const qwrap = el('questions');
DATA.questions.forEach(q=>{
  const card = document.createElement('div');
  card.className='q unanswered'; card.id='q'+q.n;
  // Shuffle options so the correct choice isn't positionally predictable
  // (authored keys cluster on one letter). Remap to fresh display letters and
  // record the correct display letter on the question.
  let entries = LETTERS.filter(L=>q.options[L]).map(L=>({orig:L, text:q.options[L]}));
  for(let i=entries.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); const t=entries[i]; entries[i]=entries[j]; entries[j]=t; }
  let opts = '';
  entries.forEach((e,idx)=>{
    const D = LETTERS[idx];
    if(e.orig===q.answer) q._correct = D;
    opts += '<div class="opt" data-n="'+q.n+'" data-l="'+D+'"><span class="let">'+D+'</span><span>'+e.text+'</span></div>';
  });
  card.innerHTML = '<div class="qh"><span class="n">Q'+q.n+'</span>'+q.prompt+'</div>'+opts+
    '<div class="expl" id="expl'+q.n+'"></div>';
  qwrap.appendChild(card);
});

qwrap.addEventListener('click', e=>{
  if(graded) return;
  const opt = e.target.closest('.opt'); if(!opt) return;
  const n = opt.dataset.n, L = opt.dataset.l;
  picks[n] = L;
  const card = el('q'+n);
  card.classList.remove('unanswered');
  card.querySelectorAll('.opt').forEach(o=>o.classList.toggle('sel', o.dataset.l===L));
  updateStatus();
});

function updateStatus(){
  const done = Object.keys(picks).length, total = DATA.questions.length;
  el('status').textContent = graded ? '' : done+' of '+total+' answered'+(done<total?'':' — ready to submit');
}
updateStatus();

el('submit').onclick = ()=>{
  const total = DATA.questions.length, done = Object.keys(picks).length;
  if(done<total){
    const miss = DATA.questions.filter(q=>!picks[q.n]);
    if(!confirm(done+' of '+total+' answered. '+(total-done)+' left blank will be marked wrong. Submit anyway?')){
      miss.forEach(q=>{ const c=el('q'+q.n); c.classList.add('flagged'); });
      if(miss[0]) el('q'+miss[0].n).scrollIntoView({behavior:'smooth',block:'center'});
      return;
    }
  }
  grade();
};

function grade(){
  graded = true;
  let correct = 0;
  DATA.questions.forEach(q=>{
    const card = el('q'+q.n); card.classList.add('graded');
    const pick = picks[q.n];
    const ans = q._correct;   // display letter of the correct option (post-shuffle)
    if(pick===ans) correct++;
    card.querySelectorAll('.opt').forEach(o=>{
      const L=o.dataset.l;
      if(L===ans) o.classList.add('correct');
      if(L===pick && pick!==ans) o.classList.add('wrongpick');
    });
    const ex = el('expl'+q.n);
    const got = pick===ans;
    ex.className = 'expl '+(got?'ok':'no');
    ex.innerHTML = '<b>'+(got?'Correct':(pick?'Not quite':'No answer'))+' — answer '+ans+'.</b> '+(q.explanation||'');
  });
  const total = DATA.questions.length, pct = Math.round(correct/total*100);
  const pass = correct>=DATA.pass_mark;
  const r = el('result');
  r.className = 'result '+(pass?'pass':'fail'); r.style.display='block';
  r.innerHTML = '<span class="big">'+correct+' / '+total+'  ·  '+pct+'%</span>'+
    (pass ? 'Passed — you cleared this phase. Review any misses, then continue to the next phase.'
          : 'Below the '+DATA.pass_mark+'/'+total+' pass mark. Review the explanations and the linked notes, then retake cold.');
  el('tscore').textContent = correct+'/'+total+' ('+pct+'%)';
  el('status').textContent = 'Scored '+correct+'/'+total+'. Scroll to review explanations.';
  el('submit').disabled = true; el('submit').style.display='none';
  el('retry').style.display='inline-block';
  try {
    const prev = JSON.parse(localStorage.getItem(LS)||'{}');
    localStorage.setItem(LS, JSON.stringify({best: Math.max(correct, prev.best||0), last: correct, total: total}));
  } catch(e){}
  window.scrollTo({top:0, behavior:'smooth'});
}

el('retry').onclick = ()=>{
  graded=false; picks={};
  el('result').style.display='none';
  el('tscore').textContent='';
  el('submit').disabled=false; el('submit').style.display='inline-block';
  el('retry').style.display='none';
  document.querySelectorAll('.q').forEach(c=>{ c.className='q unanswered'; });
  document.querySelectorAll('.opt').forEach(o=>o.classList.remove('sel','correct','wrongpick'));
  updateStatus();
  window.scrollTo({top:0, behavior:'smooth'});
};

try {
  const s = JSON.parse(localStorage.getItem(LS)||'{}');
  if(s.best!=null) el('tscore').textContent = 'Best: '+s.best+'/'+s.total;
} catch(e){}
</script>
</body>
</html>
