<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Phase Test — Interactive Course</title>
<style>
  :root { --bg:#0f1419; --panel:#1a212b; --line:#2a3543; --ink:#e6edf3; --mut:#8b98a8;
          --accent:#4f9cf9; --good:#3fb950; --bad:#f85149; --warn:#d29922; }
  * { box-sizing:border-box; }
  body { margin:0; font:15px/1.6 -apple-system,Segoe UI,Roboto,sans-serif; background:var(--bg); color:var(--ink); }
  .top { display:flex; align-items:center; gap:14px; padding:14px 22px; border-bottom:1px solid var(--line);
         position:sticky; top:0; background:rgba(15,20,25,.94); backdrop-filter:blur(6px); z-index:10; }
  .top a.home { color:var(--mut); text-decoration:none; font-size:13px; }
  .top a.home:hover { color:var(--accent); }
  .top .title { font-weight:700; flex:1; font-size:15px; }
  .top .score { font-size:13px; color:var(--mut); }
  .wrap { max-width:820px; margin:0 auto; padding:26px 22px 90px; }
  h1 { font-size:24px; margin:0 0 6px; }
  .intro { color:var(--mut); background:var(--panel); border:1px solid var(--line); border-radius:12px; padding:16px 18px; margin:16px 0 26px; }
  .q { background:var(--panel); border:1px solid var(--line); border-radius:12px; padding:18px 20px; margin:14px 0; }
  .q.unanswered.flagged { border-color:var(--warn); }
  .qh { font-weight:600; margin-bottom:12px; }
  .qh .n { color:var(--accent); margin-right:8px; }
  .opt { display:flex; gap:10px; align-items:flex-start; padding:10px 12px; border:1px solid var(--line); border-radius:9px;
         margin:7px 0; cursor:pointer; transition:background .12s,border-color .12s; }
  .opt:hover { background:#10161e; }
  .opt.sel { border-color:var(--accent); background:rgba(79,156,249,.10); }
  .opt .let { font-weight:700; color:var(--mut); flex:none; width:20px; }
  .opt.sel .let { color:var(--accent); }
  .graded .opt { cursor:default; }
  .graded .opt.correct { border-color:var(--good); background:rgba(63,185,80,.12); }
  .graded .opt.correct .let { color:var(--good); }
  .graded .opt.wrongpick { border-color:var(--bad); background:rgba(248,81,73,.12); }
  .graded .opt.wrongpick .let { color:var(--bad); }
  .expl { display:none; margin-top:12px; padding:11px 13px; border-left:3px solid var(--accent);
          background:#0c1117; border-radius:0 8px 8px 0; color:#c9d4e0; font-size:14px; }
  .graded .expl { display:block; }
  .expl.ok { border-left-color:var(--good); }
  .expl.no { border-left-color:var(--bad); }
  .bar { position:fixed; left:0; right:0; bottom:0; background:rgba(15,20,25,.97); border-top:1px solid var(--line);
         padding:12px 22px; display:flex; align-items:center; gap:16px; }
  .bar .status { flex:1; color:var(--mut); font-size:13.5px; }
  button { font:inherit; font-weight:600; cursor:pointer; border:0; border-radius:9px; padding:11px 20px; }
  #submit { background:var(--good); color:#fff; }
  #submit:disabled { background:#39414d; color:#8b98a8; cursor:not-allowed; }
  #retry { background:var(--panel); color:var(--ink); border:1px solid var(--line); display:none; }
  .result { display:none; text-align:center; padding:22px; border-radius:14px; margin:8px 0 22px; font-size:16px; }
  .result.pass { background:rgba(63,185,80,.12); border:1px solid rgba(63,185,80,.4); }
  .result.fail { background:rgba(210,153,34,.12); border:1px solid rgba(210,153,34,.4); }
  .result .big { font-size:34px; font-weight:800; display:block; margin-bottom:4px; }
</style>
</head>
<body>
<div id="pe-gate" style="position:fixed;inset:0;z-index:2147483647;background:#0d1117;display:flex;align-items:center;justify-content:center;font-family:system-ui,-apple-system,Segoe UI,Roboto,sans-serif">
  <div style="background:#161b22;border:1px solid #30363d;border-radius:14px;padding:30px 32px;max-width:360px;width:88%;text-align:center;color:#e6edf3;box-shadow:0 12px 40px rgba(0,0,0,.5)">
    <div style="font-size:21px;font-weight:700;margin-bottom:6px">Private Equity Course</div>
    <div style="color:#8b949e;font-size:13.5px;margin-bottom:18px">Enter your access code to continue.</div>
    <input id="pe-gate-input" type="password" placeholder="Access code" autocomplete="off"
      style="width:100%;box-sizing:border-box;padding:11px 12px;border-radius:8px;border:1px solid #30363d;background:#0d1117;color:#e6edf3;font-size:15px;outline:none">
    <div id="pe-gate-err" style="color:#f85149;font-size:12.5px;height:15px;margin:8px 0 2px"></div>
    <button id="pe-gate-btn" style="width:100%;padding:11px;border:0;border-radius:8px;background:#238636;color:#fff;font-size:15px;font-weight:600;cursor:pointer">Enter</button>
  </div>
</div>
<script>
(function(){
  var HASH="2ab47ce2424d6043168f930c79e3931f57f9e86ad33a8e35c2e9b6d3f1444924";
  var g=document.getElementById('pe-gate');
  if(localStorage.getItem('pe_demo_ok')==='1'){ g.remove(); return; }
  document.documentElement.style.overflow='hidden';
  var inp=document.getElementById('pe-gate-input'), err=document.getElementById('pe-gate-err');
  try{ inp.focus(); }catch(e){}
  async function sha(s){ var b=await crypto.subtle.digest('SHA-256', new TextEncoder().encode(s)); return Array.from(new Uint8Array(b)).map(function(x){return x.toString(16).padStart(2,'0');}).join(''); }
  async function submit(){
    var v=inp.value; if(!v) return;
    var h; try{ h=await sha(v); }catch(e){ err.textContent='Browser too old'; return; }
    if(h===HASH){ localStorage.setItem('pe_demo_ok','1'); localStorage.setItem('pe_demo_code',v); document.documentElement.style.overflow=''; g.remove(); }
    else { err.textContent='Incorrect code'; inp.value=''; inp.focus(); }
  }
  document.getElementById('pe-gate-btn').onclick=submit;
  inp.addEventListener('keydown', function(e){ if(e.key==='Enter') submit(); });
})();
</script>
<div class="top">
  <a class="home" href="../index.html">☰ All lessons</a>
  <span class="title" id="ttitle"></span>
  <span class="score" id="tscore"></span>
</div>
<div class="wrap">
  <h1 id="h1"></h1>
  <div class="intro" id="intro"></div>
  <div class="result" id="result"></div>
  <div id="questions"></div>
</div>
<div class="bar">
  <span class="status" id="status"></span>
  <button id="retry">Retry</button>
  <button id="submit">Submit test</button>
</div>
<script>
const DATA = {"phase": "7", "title": "Phase 7 Test — Debt and Capital Markets", "pass_mark": 20, "questions": [{"n": 1, "prompt": "From safest to riskiest, the LBO capital stack is broadly:", "options": {"A": "Equity → mezzanine → senior secured", "B": "Senior secured debt → second lien/subordinated → mezzanine → equity", "C": "Mezzanine → equity → senior", "D": "PIK → senior → revolver"}, "answer": "B", "explanation": "Senior secured → second lien/subordinated → mezzanine → equity, safest to riskiest."}, {"n": 2, "prompt": "Senior secured debt is the safest tranche because it:", "options": {"A": "Has the highest interest rate", "B": "Has first-priority claim on assets/cash flows and is secured by collateral", "C": "Is subordinated to equity", "D": "Pays interest in kind"}, "answer": "B", "explanation": "Senior secured has first-priority claim and collateral."}, {"n": 3, "prompt": "Term Loan A (TLA) versus Term Loan B (TLB): TLA typically has:", "options": {"A": "A longer tenor and bullet repayment", "B": "A shorter tenor with more amortisation, often held by banks", "C": "No amortisation and institutional holders", "D": "Payment-in-kind interest"}, "answer": "B", "explanation": "TLA: shorter tenor, more amortisation, typically bank-held."}, {"n": 4, "prompt": "Term Loan B (TLB) is characterised by:", "options": {"A": "Heavy amortisation and bank holders", "B": "Minimal amortisation, a bullet at maturity, and mostly institutional (CLO/fund) holders", "C": "Equity-like returns", "D": "A first-priority claim below the revolver only"}, "answer": "B", "explanation": "TLB: minimal amortisation, bullet maturity, institutional/CLO holders."}, {"n": 5, "prompt": "A revolving credit facility (RCF) primarily provides:", "options": {"A": "Long-term acquisition financing", "B": "Flexible working-capital / liquidity that can be drawn and repaid as needed", "C": "Subordinated mezzanine capital", "D": "Equity"}, "answer": "B", "explanation": "The RCF is a flexible drawn/repaid working-capital line."}, {"n": 6, "prompt": "Mezzanine debt sits:", "options": {"A": "Above senior secured debt", "B": "Between senior debt and equity, carrying higher yield and often equity warrants", "C": "At the same level as the revolver", "D": "Outside the capital structure"}, "answer": "B", "explanation": "Mezzanine sits between senior debt and equity, higher yield, often with warrants."}, {"n": 7, "prompt": "PIK (payment-in-kind) notes:", "options": {"A": "Pay cash interest quarterly", "B": "Accrue interest onto the principal balance, deferring cash outflow", "C": "Are the most senior tranche", "D": "Reduce total leverage"}, "answer": "B", "explanation": "PIK accrues interest onto principal, deferring cash."}, {"n": 8, "prompt": "High-yield bonds in LBOs are:", "options": {"A": "Investment-grade, low-yield instruments", "B": "Below-investment-grade public/traded bonds used to finance larger deals, typically unsecured or second-lien", "C": "Bank revolvers", "D": "Equity securities"}, "answer": "B", "explanation": "High-yield bonds are below-investment-grade traded bonds for larger deals."}, {"n": 9, "prompt": "A \"covenant-lite\" (cov-lite) loan is one that:", "options": {"A": "Has more maintenance covenants than usual", "B": "Lacks maintenance covenants (relying on incurrence covenants only), giving borrowers more flexibility", "C": "Cannot be traded", "D": "Pays interest in kind"}, "answer": "B", "explanation": "Cov-lite loans lack maintenance covenants, relying on incurrence tests."}, {"n": 10, "prompt": "The key difference between maintenance and incurrence covenants is that maintenance covenants are:", "options": {"A": "Tested only when the borrower takes a specific action", "B": "Tested periodically regardless of borrower action (e.g., quarterly ratio tests)", "C": "Never tested", "D": "Only in equity documents"}, "answer": "B", "explanation": "Maintenance covenants are tested periodically regardless of borrower action."}, {"n": 11, "prompt": "Incurrence covenants are triggered:", "options": {"A": "Every quarter automatically", "B": "Only when the borrower takes a defined action (e.g., raising more debt, paying a dividend)", "C": "At the exit", "D": "When equity is issued"}, "answer": "B", "explanation": "Incurrence covenants trigger only on a defined borrower action."}, {"n": 12, "prompt": "Why do sponsors favour cov-lite structures?", "options": {"A": "They raise the interest rate", "B": "They reduce the risk of a technical default from a periodic ratio breach, giving more room in a downturn", "C": "They increase amortisation", "D": "They subordinate senior lenders"}, "answer": "B", "explanation": "Cov-lite reduces technical-default risk, giving room in a downturn."}, {"n": 13, "prompt": "Why do cov-lite structures worry credit investors?", "options": {"A": "They repay too quickly", "B": "Lenders lose an early-warning mechanism and may act only later, closer to a payment default — often with lower recoveries", "C": "They eliminate all interest", "D": "They rank above equity"}, "answer": "B", "explanation": "Cov-lite removes the early-warning trip-wire, often lowering recoveries."}, {"n": 14, "prompt": "Ranked by typical cost of capital (cheapest to most expensive):", "options": {"A": "Equity → mezzanine → senior secured", "B": "Senior secured → high yield/mezzanine → equity", "C": "Mezzanine → senior → equity", "D": "PIK → equity → senior"}, "answer": "B", "explanation": "Senior secured (cheapest) → high yield/mezz → equity (most expensive)."}, {"n": 15, "prompt": "\"Second lien\" debt is:", "options": {"A": "The most senior claim", "B": "Secured but ranking behind first-lien senior debt on the same collateral", "C": "Always unsecured", "D": "Equivalent to equity"}, "answer": "B", "explanation": "Second lien is secured but ranks behind first lien on the collateral."}, {"n": 16, "prompt": "An RCF is often left undrawn at close because:", "options": {"A": "It cannot be drawn after closing", "B": "It is a standby liquidity line; the company pays a commitment fee on the undrawn portion", "C": "It has the highest interest cost in the stack", "D": "It is subordinated to equity"}, "answer": "B", "explanation": "The RCF is standby liquidity; a commitment fee applies to the undrawn portion."}, {"n": 17, "prompt": "Mezzanine investors are often compensated with equity warrants to:", "options": {"A": "Reduce their return", "B": "Capture upside in exchange for the higher risk of their subordinated position", "C": "Increase seniority", "D": "Convert to senior debt"}, "answer": "B", "explanation": "Warrants give mezzanine upside for taking subordinated risk."}, {"n": 18, "prompt": "The benchmark reference rate for most floating-rate leveraged loans (post-LIBOR) is:", "options": {"A": "The Fed funds target only", "B": "SOFR (Secured Overnight Financing Rate) plus a spread", "C": "The dividend yield", "D": "The prime mortgage rate"}, "answer": "B", "explanation": "SOFR plus a spread is the post-LIBOR benchmark."}, {"n": 19, "prompt": "A TLB is quoted at \"SOFR + 450.\" If SOFR is 5%, the approximate all-in rate is:", "options": {"A": "4.5%", "B": "9.5%", "C": "5.0%", "D": "45%"}, "answer": "B", "explanation": "5% + 4.50% = ~9.5% all-in."}, {"n": 20, "prompt": "In a bankruptcy, which claimant is generally paid first?", "options": {"A": "Common equity", "B": "First-lien senior secured lenders", "C": "Mezzanine holders", "D": "PIK note holders"}, "answer": "B", "explanation": "First-lien senior secured lenders are paid first in bankruptcy."}, {"n": 21, "prompt": "\"Unitranche\" debt (context for this era) blends:", "options": {"A": "Senior and mezzanine into a single facility at a blended rate, common in private credit/direct lending", "B": "Equity and revolver", "C": "Two revolvers", "D": "High-yield and equity"}, "answer": "A", "explanation": "Unitranche blends senior and mezzanine into one facility at a blended rate."}, {"n": 22, "prompt": "Compared with a broadly syndicated TLB, high-yield bonds usually have:", "options": {"A": "Floating rates and heavy amortisation", "B": "Fixed coupons, longer tenors, bullet maturities, and call protection", "C": "Bank-only ownership", "D": "First-priority security always"}, "answer": "B", "explanation": "High-yield bonds: fixed coupons, longer tenors, bullets, call protection."}, {"n": 23, "prompt": "The proliferation of cov-lite loans since ~2010 was enabled largely by:", "options": {"A": "Regulatory mandates requiring them", "B": "Strong investor demand for leveraged loans (e.g., CLOs) shifting negotiating leverage to borrowers/sponsors", "C": "A decline in PE fundraising", "D": "The disappearance of institutional lenders"}, "answer": "B", "explanation": "CLO/investor demand for leveraged loans shifted leverage to borrowers, enabling cov-lite."}, {"n": 24, "prompt": "Which tranche is most exposed to loss if the company underperforms but avoids bankruptcy?", "options": {"A": "First-lien senior secured", "B": "Subordinated/mezzanine and equity (junior claims)", "C": "The revolver", "D": "Senior secured bonds"}, "answer": "B", "explanation": "Junior claims (mezzanine, equity) absorb underperformance losses first short of bankruptcy."}, {"n": 25, "prompt": "Putting the stack together for a $600m deal financed with $250m first-lien TLB, $100m second lien, $50m mezzanine, and $200m equity — which statement is correct?", "options": {"A": "Equity has the first claim on assets", "B": "In distress, first-lien TLB is repaid before second lien, then mezzanine, with equity last", "C": "Mezzanine ranks above the TLB", "D": "The second lien is senior to the first lien"}, "answer": "B", "explanation": "Priority runs first-lien TLB → second lien → mezzanine → equity last."}]};
const LS = 'pe-test::'+DATA.phase;
const el = id => document.getElementById(id);
const LETTERS = ['A','B','C','D'];
let picks = {};   // n -> letter
let graded = false;

el('ttitle').textContent = DATA.title;
el('h1').textContent = DATA.title;
el('intro').innerHTML = DATA.questions.length+' multiple-choice questions. Choose one answer per question, then press '+
  '<b>Submit test</b>. You need <b>'+DATA.pass_mark+'/'+DATA.questions.length+'</b> ('+
  Math.round(DATA.pass_mark/DATA.questions.length*100)+'%) to pass. Answers and explanations reveal on submit.';

const qwrap = el('questions');
DATA.questions.forEach(q=>{
  const card = document.createElement('div');
  card.className='q unanswered'; card.id='q'+q.n;
  // Shuffle options so the correct choice isn't positionally predictable
  // (authored keys cluster on one letter). Remap to fresh display letters and
  // record the correct display letter on the question.
  let entries = LETTERS.filter(L=>q.options[L]).map(L=>({orig:L, text:q.options[L]}));
  for(let i=entries.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); const t=entries[i]; entries[i]=entries[j]; entries[j]=t; }
  let opts = '';
  entries.forEach((e,idx)=>{
    const D = LETTERS[idx];
    if(e.orig===q.answer) q._correct = D;
    opts += '<div class="opt" data-n="'+q.n+'" data-l="'+D+'"><span class="let">'+D+'</span><span>'+e.text+'</span></div>';
  });
  card.innerHTML = '<div class="qh"><span class="n">Q'+q.n+'</span>'+q.prompt+'</div>'+opts+
    '<div class="expl" id="expl'+q.n+'"></div>';
  qwrap.appendChild(card);
});

qwrap.addEventListener('click', e=>{
  if(graded) return;
  const opt = e.target.closest('.opt'); if(!opt) return;
  const n = opt.dataset.n, L = opt.dataset.l;
  picks[n] = L;
  const card = el('q'+n);
  card.classList.remove('unanswered');
  card.querySelectorAll('.opt').forEach(o=>o.classList.toggle('sel', o.dataset.l===L));
  updateStatus();
});

function updateStatus(){
  const done = Object.keys(picks).length, total = DATA.questions.length;
  el('status').textContent = graded ? '' : done+' of '+total+' answered'+(done<total?'':' — ready to submit');
}
updateStatus();

el('submit').onclick = ()=>{
  const total = DATA.questions.length, done = Object.keys(picks).length;
  if(done<total){
    const miss = DATA.questions.filter(q=>!picks[q.n]);
    if(!confirm(done+' of '+total+' answered. '+(total-done)+' left blank will be marked wrong. Submit anyway?')){
      miss.forEach(q=>{ const c=el('q'+q.n); c.classList.add('flagged'); });
      if(miss[0]) el('q'+miss[0].n).scrollIntoView({behavior:'smooth',block:'center'});
      return;
    }
  }
  grade();
};

function grade(){
  graded = true;
  let correct = 0;
  DATA.questions.forEach(q=>{
    const card = el('q'+q.n); card.classList.add('graded');
    const pick = picks[q.n];
    const ans = q._correct;   // display letter of the correct option (post-shuffle)
    if(pick===ans) correct++;
    card.querySelectorAll('.opt').forEach(o=>{
      const L=o.dataset.l;
      if(L===ans) o.classList.add('correct');
      if(L===pick && pick!==ans) o.classList.add('wrongpick');
    });
    const ex = el('expl'+q.n);
    const got = pick===ans;
    ex.className = 'expl '+(got?'ok':'no');
    ex.innerHTML = '<b>'+(got?'Correct':(pick?'Not quite':'No answer'))+' — answer '+ans+'.</b> '+(q.explanation||'');
  });
  const total = DATA.questions.length, pct = Math.round(correct/total*100);
  const pass = correct>=DATA.pass_mark;
  const r = el('result');
  r.className = 'result '+(pass?'pass':'fail'); r.style.display='block';
  r.innerHTML = '<span class="big">'+correct+' / '+total+'  ·  '+pct+'%</span>'+
    (pass ? 'Passed — you cleared this phase. Review any misses, then continue to the next phase.'
          : 'Below the '+DATA.pass_mark+'/'+total+' pass mark. Review the explanations and the linked notes, then retake cold.');
  el('tscore').textContent = correct+'/'+total+' ('+pct+'%)';
  el('status').textContent = 'Scored '+correct+'/'+total+'. Scroll to review explanations.';
  el('submit').disabled = true; el('submit').style.display='none';
  el('retry').style.display='inline-block';
  try {
    const prev = JSON.parse(localStorage.getItem(LS)||'{}');
    localStorage.setItem(LS, JSON.stringify({best: Math.max(correct, prev.best||0), last: correct, total: total}));
  } catch(e){}
  window.scrollTo({top:0, behavior:'smooth'});
}

el('retry').onclick = ()=>{
  graded=false; picks={};
  el('result').style.display='none';
  el('tscore').textContent='';
  el('submit').disabled=false; el('submit').style.display='inline-block';
  el('retry').style.display='none';
  document.querySelectorAll('.q').forEach(c=>{ c.className='q unanswered'; });
  document.querySelectorAll('.opt').forEach(o=>o.classList.remove('sel','correct','wrongpick'));
  updateStatus();
  window.scrollTo({top:0, behavior:'smooth'});
};

try {
  const s = JSON.parse(localStorage.getItem(LS)||'{}');
  if(s.best!=null) el('tscore').textContent = 'Best: '+s.best+'/'+s.total;
} catch(e){}
</script>
</body>
</html>
