<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Phase Test — Interactive Course</title>
<style>
  :root { --bg:#0f1419; --panel:#1a212b; --line:#2a3543; --ink:#e6edf3; --mut:#8b98a8;
          --accent:#4f9cf9; --good:#3fb950; --bad:#f85149; --warn:#d29922; }
  * { box-sizing:border-box; }
  body { margin:0; font:15px/1.6 -apple-system,Segoe UI,Roboto,sans-serif; background:var(--bg); color:var(--ink); }
  .top { display:flex; align-items:center; gap:14px; padding:14px 22px; border-bottom:1px solid var(--line);
         position:sticky; top:0; background:rgba(15,20,25,.94); backdrop-filter:blur(6px); z-index:10; }
  .top a.home { color:var(--mut); text-decoration:none; font-size:13px; }
  .top a.home:hover { color:var(--accent); }
  .top .title { font-weight:700; flex:1; font-size:15px; }
  .top .score { font-size:13px; color:var(--mut); }
  .wrap { max-width:820px; margin:0 auto; padding:26px 22px 90px; }
  h1 { font-size:24px; margin:0 0 6px; }
  .intro { color:var(--mut); background:var(--panel); border:1px solid var(--line); border-radius:12px; padding:16px 18px; margin:16px 0 26px; }
  .q { background:var(--panel); border:1px solid var(--line); border-radius:12px; padding:18px 20px; margin:14px 0; }
  .q.unanswered.flagged { border-color:var(--warn); }
  .qh { font-weight:600; margin-bottom:12px; }
  .qh .n { color:var(--accent); margin-right:8px; }
  .opt { display:flex; gap:10px; align-items:flex-start; padding:10px 12px; border:1px solid var(--line); border-radius:9px;
         margin:7px 0; cursor:pointer; transition:background .12s,border-color .12s; }
  .opt:hover { background:#10161e; }
  .opt.sel { border-color:var(--accent); background:rgba(79,156,249,.10); }
  .opt .let { font-weight:700; color:var(--mut); flex:none; width:20px; }
  .opt.sel .let { color:var(--accent); }
  .graded .opt { cursor:default; }
  .graded .opt.correct { border-color:var(--good); background:rgba(63,185,80,.12); }
  .graded .opt.correct .let { color:var(--good); }
  .graded .opt.wrongpick { border-color:var(--bad); background:rgba(248,81,73,.12); }
  .graded .opt.wrongpick .let { color:var(--bad); }
  .expl { display:none; margin-top:12px; padding:11px 13px; border-left:3px solid var(--accent);
          background:#0c1117; border-radius:0 8px 8px 0; color:#c9d4e0; font-size:14px; }
  .graded .expl { display:block; }
  .expl.ok { border-left-color:var(--good); }
  .expl.no { border-left-color:var(--bad); }
  .bar { position:fixed; left:0; right:0; bottom:0; background:rgba(15,20,25,.97); border-top:1px solid var(--line);
         padding:12px 22px; display:flex; align-items:center; gap:16px; }
  .bar .status { flex:1; color:var(--mut); font-size:13.5px; }
  button { font:inherit; font-weight:600; cursor:pointer; border:0; border-radius:9px; padding:11px 20px; }
  #submit { background:var(--good); color:#fff; }
  #submit:disabled { background:#39414d; color:#8b98a8; cursor:not-allowed; }
  #retry { background:var(--panel); color:var(--ink); border:1px solid var(--line); display:none; }
  .result { display:none; text-align:center; padding:22px; border-radius:14px; margin:8px 0 22px; font-size:16px; }
  .result.pass { background:rgba(63,185,80,.12); border:1px solid rgba(63,185,80,.4); }
  .result.fail { background:rgba(210,153,34,.12); border:1px solid rgba(210,153,34,.4); }
  .result .big { font-size:34px; font-weight:800; display:block; margin-bottom:4px; }
</style>
</head>
<body>
<div id="pe-gate" style="position:fixed;inset:0;z-index:2147483647;background:#0d1117;display:flex;align-items:center;justify-content:center;font-family:system-ui,-apple-system,Segoe UI,Roboto,sans-serif">
  <div style="background:#161b22;border:1px solid #30363d;border-radius:14px;padding:30px 32px;max-width:360px;width:88%;text-align:center;color:#e6edf3;box-shadow:0 12px 40px rgba(0,0,0,.5)">
    <div style="font-size:21px;font-weight:700;margin-bottom:6px">Private Equity Course</div>
    <div style="color:#8b949e;font-size:13.5px;margin-bottom:18px">Enter your access code to continue.</div>
    <input id="pe-gate-input" type="password" placeholder="Access code" autocomplete="off"
      style="width:100%;box-sizing:border-box;padding:11px 12px;border-radius:8px;border:1px solid #30363d;background:#0d1117;color:#e6edf3;font-size:15px;outline:none">
    <div id="pe-gate-err" style="color:#f85149;font-size:12.5px;height:15px;margin:8px 0 2px"></div>
    <button id="pe-gate-btn" style="width:100%;padding:11px;border:0;border-radius:8px;background:#238636;color:#fff;font-size:15px;font-weight:600;cursor:pointer">Enter</button>
  </div>
</div>
<script>
(function(){
  var HASH="2ab47ce2424d6043168f930c79e3931f57f9e86ad33a8e35c2e9b6d3f1444924";
  var g=document.getElementById('pe-gate');
  if(localStorage.getItem('pe_demo_ok')==='1'){ g.remove(); return; }
  document.documentElement.style.overflow='hidden';
  var inp=document.getElementById('pe-gate-input'), err=document.getElementById('pe-gate-err');
  try{ inp.focus(); }catch(e){}
  async function sha(s){ var b=await crypto.subtle.digest('SHA-256', new TextEncoder().encode(s)); return Array.from(new Uint8Array(b)).map(function(x){return x.toString(16).padStart(2,'0');}).join(''); }
  async function submit(){
    var v=inp.value; if(!v) return;
    var h; try{ h=await sha(v); }catch(e){ err.textContent='Browser too old'; return; }
    if(h===HASH){ localStorage.setItem('pe_demo_ok','1'); localStorage.setItem('pe_demo_code',v); document.documentElement.style.overflow=''; g.remove(); }
    else { err.textContent='Incorrect code'; inp.value=''; inp.focus(); }
  }
  document.getElementById('pe-gate-btn').onclick=submit;
  inp.addEventListener('keydown', function(e){ if(e.key==='Enter') submit(); });
})();
</script>
<div class="top">
  <a class="home" href="../index.html">☰ All lessons</a>
  <span class="title" id="ttitle"></span>
  <span class="score" id="tscore"></span>
</div>
<div class="wrap">
  <h1 id="h1"></h1>
  <div class="intro" id="intro"></div>
  <div class="result" id="result"></div>
  <div id="questions"></div>
</div>
<div class="bar">
  <span class="status" id="status"></span>
  <button id="retry">Retry</button>
  <button id="submit">Submit test</button>
</div>
<script>
const DATA = {"phase": "10", "title": "Phase 10 Test — Exits and Advanced Deal Structures", "pass_mark": 20, "questions": [{"n": 1, "prompt": "A strategic (trade) sale exits the company to:", "options": {"A": "Another PE firm", "B": "A corporate acquirer in a related industry, often able to pay for synergies", "C": "The public markets", "D": "The company's lenders"}, "answer": "B", "explanation": "A strategic sale goes to a corporate acquirer that can pay for synergies."}, {"n": 2, "prompt": "A secondary buyout (SBO) exits the company to:", "options": {"A": "A strategic buyer", "B": "Another private equity firm", "C": "Retail investors via IPO", "D": "The management team only"}, "answer": "B", "explanation": "An SBO sells to another PE firm."}, {"n": 3, "prompt": "An IPO exit involves:", "options": {"A": "Selling 100% for cash at listing", "B": "Listing shares publicly, usually with the sponsor selling down over time subject to lock-ups", "C": "Selling to a competitor", "D": "A dividend recap"}, "answer": "B", "explanation": "An IPO lists shares publicly with a phased, lock-up-constrained sponsor sell-down."}, {"n": 4, "prompt": "A strategic buyer can often pay the highest price because it:", "options": {"A": "Requires no return", "B": "Can capture cost and revenue synergies unavailable to a financial buyer", "C": "Uses more leverage than a sponsor", "D": "Ignores diligence"}, "answer": "B", "explanation": "Strategics can pay top price via synergies a financial buyer lacks."}, {"n": 5, "prompt": "A reason a sponsor might prefer an SBO over a trade sale is:", "options": {"A": "Strategics always pay less", "B": "Speed, certainty, and confidentiality — a PE buyer knows the playbook and needs no board/synergy sign-off", "C": "SBOs avoid all diligence", "D": "SBOs guarantee a higher multiple"}, "answer": "B", "explanation": "SBOs offer speed, certainty, and confidentiality — the PE buyer knows the playbook."}, {"n": 6, "prompt": "In an IPO, a \"lock-up\" period:", "options": {"A": "Lets the sponsor sell all shares on day one", "B": "Restricts insiders/sponsors from selling shares for a set period after listing", "C": "Fixes the offer price forever", "D": "Eliminates market risk"}, "answer": "B", "explanation": "A lock-up restricts insider/sponsor selling for a set post-IPO period."}, {"n": 7, "prompt": "A \"dual-track\" exit process runs:", "options": {"A": "Two IPOs simultaneously", "B": "An M&A sale and an IPO in parallel to preserve optionality and competitive tension", "C": "Two secondary buyouts", "D": "A sale and a dividend recap"}, "answer": "B", "explanation": "Dual-track runs an M&A sale and an IPO in parallel to preserve optionality."}, {"n": 8, "prompt": "A GP-led secondary / continuation vehicle typically:", "options": {"A": "Sells the company to an unrelated third party for cash", "B": "Moves an asset from an existing fund into a new vehicle the same GP manages, giving existing LPs the option to cash out or roll", "C": "Is an IPO", "D": "Repays all fund debt"}, "answer": "B", "explanation": "A continuation vehicle moves an asset into a new same-GP fund; LPs cash out or roll."}, {"n": 9, "prompt": "The central conflict of interest in a GP-led secondary is that the GP is:", "options": {"A": "Only a buyer", "B": "Effectively on both sides — seller (old fund) and buyer/manager (new vehicle) — so pricing may favour the GP", "C": "Only a lender", "D": "Not involved in pricing"}, "answer": "B", "explanation": "The GP sits on both sides — seller and buyer/manager — creating a pricing conflict."}, {"n": 10, "prompt": "How is the GP-led conflict usually mitigated?", "options": {"A": "By ignoring it", "B": "Independent valuation, LPAC consent, and a fairness opinion / competitive price discovery", "C": "By raising leverage", "D": "By eliminating the hurdle"}, "answer": "B", "explanation": "Mitigants: independent valuation, LPAC consent, and a fairness opinion / price discovery."}, {"n": 11, "prompt": "A corporate carve-out is:", "options": {"A": "Buying an entire public company", "B": "Acquiring a division or business unit separated from its parent", "C": "An IPO of the parent", "D": "A dividend recap"}, "answer": "B", "explanation": "A carve-out acquires a division separated from its parent."}, {"n": 12, "prompt": "A distinctive challenge of carve-outs is:", "options": {"A": "There is never any diligence", "B": "Standing up standalone functions (IT, HR, finance) the parent used to provide — via a Transition Services Agreement (TSA)", "C": "They require no financing", "D": "They always trade at a premium"}, "answer": "B", "explanation": "Carve-outs must build standalone functions the parent provided, often via a TSA."}, {"n": 13, "prompt": "A Transition Services Agreement (TSA) in a carve-out:", "options": {"A": "Sets the entry multiple", "B": "Has the seller temporarily provide shared services to the carved-out business until it can operate independently", "C": "Is a debt tranche", "D": "Guarantees the exit price"}, "answer": "B", "explanation": "A TSA has the seller provide shared services temporarily post-close."}, {"n": 14, "prompt": "In SPA negotiation, \"locked-box\" pricing means:", "options": {"A": "The price adjusts at completion via completion accounts", "B": "The equity price is fixed at a historical balance-sheet date, with value accruing to the buyer from then", "C": "There is no purchase price", "D": "The buyer sets price after closing"}, "answer": "B", "explanation": "Locked-box fixes equity price at a historical date, value accruing to the buyer thereafter."}, {"n": 15, "prompt": "Representations and warranties in an SPA function to:", "options": {"A": "Guarantee returns", "B": "Allocate risk by having the seller make statements about the business; breaches can trigger indemnity claims", "C": "Set the management fee", "D": "Fix the hold period"}, "answer": "B", "explanation": "Reps and warranties allocate risk; breaches can trigger indemnity claims."}, {"n": 16, "prompt": "Warranty & Indemnity (W&I) insurance is used to:", "options": {"A": "Insure the company's factories", "B": "Transfer breach-of-warranty risk to an insurer, enabling cleaner exits (e.g., a \"clean\" seller with limited recourse)", "C": "Guarantee the IPO price", "D": "Replace due diligence"}, "answer": "B", "explanation": "W&I insurance transfers warranty-breach risk to an insurer for cleaner exits."}, {"n": 17, "prompt": "An \"earn-out\" in an SPA:", "options": {"A": "Pays the seller additional consideration contingent on the business hitting future targets", "B": "Fixes the price with no contingency", "C": "Is a debt instrument", "D": "Is the GP's carry"}, "answer": "A", "explanation": "An earn-out pays extra consideration contingent on hitting future targets."}, {"n": 18, "prompt": "In a competitive auction, the seller's adviser typically seeks to:", "options": {"A": "Reduce the number of bidders to one early", "B": "Maintain tension among multiple bidders to maximise price, then grant exclusivity late", "C": "Avoid any diligence", "D": "Sell only via IPO"}, "answer": "B", "explanation": "Sellers keep multiple bidders in tension to maximise price, granting exclusivity late."}, {"n": 19, "prompt": "Which exit route generally has the *longest* and most market-dependent timeline?", "options": {"A": "Trade sale", "B": "IPO (subject to market windows, roadshows, regulatory review, lock-ups)", "C": "Secondary buyout", "D": "Dividend recap"}, "answer": "B", "explanation": "IPOs have the longest, most market-window-dependent timeline."}, {"n": 20, "prompt": "A reason IPOs rarely deliver an immediate full cash exit is:", "options": {"A": "The sponsor must sell everything at once by law", "B": "Lock-ups and market impact force a phased sell-down over months/quarters", "C": "IPOs have no share price", "D": "The GP is prohibited from selling ever"}, "answer": "B", "explanation": "Lock-ups and market impact force a phased IPO sell-down."}, {"n": 21, "prompt": "\"Exit optionality\" designed at entry means:", "options": {"A": "Locking into a single buyer", "B": "Structuring the deal so multiple exit routes (trade, SBO, IPO) remain viable later", "C": "Avoiding exits entirely", "D": "Fixing the exit multiple at entry"}, "answer": "B", "explanation": "Exit optionality keeps trade/SBO/IPO routes viable."}, {"n": 22, "prompt": "Continuation vehicles have grown partly because they let GPs:", "options": {"A": "Avoid ever returning capital", "B": "Hold high-quality \"trophy\" assets longer while offering liquidity to LPs who want out", "C": "Eliminate management fees", "D": "Skip valuations"}, "answer": "B", "explanation": "Continuation vehicles let GPs hold trophy assets longer while giving LPs liquidity."}, {"n": 23, "prompt": "In an SPA, a \"material adverse change\" (MAC) condition primarily protects the:", "options": {"A": "Seller against a low price", "B": "Buyer, by allowing withdrawal/renegotiation if the business seriously deteriorates before completion", "C": "Lenders' carry", "D": "LPs' hurdle"}, "answer": "B", "explanation": "A MAC condition protects the buyer against serious pre-completion deterioration."}, {"n": 24, "prompt": "Choosing an exit route, a sponsor should weigh:", "options": {"A": "Only the headline price", "B": "Price, certainty/speed, confidentiality, market conditions, and residual risk (e.g., earn-outs, lock-ups)", "C": "Only the domicile", "D": "Only the management fee"}, "answer": "B", "explanation": "Route choice weighs price, certainty, confidentiality, market, and residual risk."}, {"n": 25, "prompt": "A prized, fast-growing asset is nearing the end of the fund's life, but the GP believes it has years of upside. LPs are split on liquidity. The most fitting structure is:", "options": {"A": "An immediate fire-sale trade exit", "B": "A GP-led continuation vehicle with independent pricing and an LPAC-approved cash-out-or-roll option", "C": "A dividend recap only", "D": "Doing nothing until forced liquidation"}, "answer": "B", "explanation": "A GP-led continuation vehicle with independent pricing and an LPAC-approved option fits."}]};
const LS = 'pe-test::'+DATA.phase;
const el = id => document.getElementById(id);
const LETTERS = ['A','B','C','D'];
let picks = {};   // n -> letter
let graded = false;

el('ttitle').textContent = DATA.title;
el('h1').textContent = DATA.title;
el('intro').innerHTML = DATA.questions.length+' multiple-choice questions. Choose one answer per question, then press '+
  '<b>Submit test</b>. You need <b>'+DATA.pass_mark+'/'+DATA.questions.length+'</b> ('+
  Math.round(DATA.pass_mark/DATA.questions.length*100)+'%) to pass. Answers and explanations reveal on submit.';

const qwrap = el('questions');
DATA.questions.forEach(q=>{
  const card = document.createElement('div');
  card.className='q unanswered'; card.id='q'+q.n;
  // Shuffle options so the correct choice isn't positionally predictable
  // (authored keys cluster on one letter). Remap to fresh display letters and
  // record the correct display letter on the question.
  let entries = LETTERS.filter(L=>q.options[L]).map(L=>({orig:L, text:q.options[L]}));
  for(let i=entries.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); const t=entries[i]; entries[i]=entries[j]; entries[j]=t; }
  let opts = '';
  entries.forEach((e,idx)=>{
    const D = LETTERS[idx];
    if(e.orig===q.answer) q._correct = D;
    opts += '<div class="opt" data-n="'+q.n+'" data-l="'+D+'"><span class="let">'+D+'</span><span>'+e.text+'</span></div>';
  });
  card.innerHTML = '<div class="qh"><span class="n">Q'+q.n+'</span>'+q.prompt+'</div>'+opts+
    '<div class="expl" id="expl'+q.n+'"></div>';
  qwrap.appendChild(card);
});

qwrap.addEventListener('click', e=>{
  if(graded) return;
  const opt = e.target.closest('.opt'); if(!opt) return;
  const n = opt.dataset.n, L = opt.dataset.l;
  picks[n] = L;
  const card = el('q'+n);
  card.classList.remove('unanswered');
  card.querySelectorAll('.opt').forEach(o=>o.classList.toggle('sel', o.dataset.l===L));
  updateStatus();
});

function updateStatus(){
  const done = Object.keys(picks).length, total = DATA.questions.length;
  el('status').textContent = graded ? '' : done+' of '+total+' answered'+(done<total?'':' — ready to submit');
}
updateStatus();

el('submit').onclick = ()=>{
  const total = DATA.questions.length, done = Object.keys(picks).length;
  if(done<total){
    const miss = DATA.questions.filter(q=>!picks[q.n]);
    if(!confirm(done+' of '+total+' answered. '+(total-done)+' left blank will be marked wrong. Submit anyway?')){
      miss.forEach(q=>{ const c=el('q'+q.n); c.classList.add('flagged'); });
      if(miss[0]) el('q'+miss[0].n).scrollIntoView({behavior:'smooth',block:'center'});
      return;
    }
  }
  grade();
};

function grade(){
  graded = true;
  let correct = 0;
  DATA.questions.forEach(q=>{
    const card = el('q'+q.n); card.classList.add('graded');
    const pick = picks[q.n];
    const ans = q._correct;   // display letter of the correct option (post-shuffle)
    if(pick===ans) correct++;
    card.querySelectorAll('.opt').forEach(o=>{
      const L=o.dataset.l;
      if(L===ans) o.classList.add('correct');
      if(L===pick && pick!==ans) o.classList.add('wrongpick');
    });
    const ex = el('expl'+q.n);
    const got = pick===ans;
    ex.className = 'expl '+(got?'ok':'no');
    ex.innerHTML = '<b>'+(got?'Correct':(pick?'Not quite':'No answer'))+' — answer '+ans+'.</b> '+(q.explanation||'');
  });
  const total = DATA.questions.length, pct = Math.round(correct/total*100);
  const pass = correct>=DATA.pass_mark;
  const r = el('result');
  r.className = 'result '+(pass?'pass':'fail'); r.style.display='block';
  r.innerHTML = '<span class="big">'+correct+' / '+total+'  ·  '+pct+'%</span>'+
    (pass ? 'Passed — you cleared this phase. Review any misses, then continue to the next phase.'
          : 'Below the '+DATA.pass_mark+'/'+total+' pass mark. Review the explanations and the linked notes, then retake cold.');
  el('tscore').textContent = correct+'/'+total+' ('+pct+'%)';
  el('status').textContent = 'Scored '+correct+'/'+total+'. Scroll to review explanations.';
  el('submit').disabled = true; el('submit').style.display='none';
  el('retry').style.display='inline-block';
  try {
    const prev = JSON.parse(localStorage.getItem(LS)||'{}');
    localStorage.setItem(LS, JSON.stringify({best: Math.max(correct, prev.best||0), last: correct, total: total}));
  } catch(e){}
  window.scrollTo({top:0, behavior:'smooth'});
}

el('retry').onclick = ()=>{
  graded=false; picks={};
  el('result').style.display='none';
  el('tscore').textContent='';
  el('submit').disabled=false; el('submit').style.display='inline-block';
  el('retry').style.display='none';
  document.querySelectorAll('.q').forEach(c=>{ c.className='q unanswered'; });
  document.querySelectorAll('.opt').forEach(o=>o.classList.remove('sel','correct','wrongpick'));
  updateStatus();
  window.scrollTo({top:0, behavior:'smooth'});
};

try {
  const s = JSON.parse(localStorage.getItem(LS)||'{}');
  if(s.best!=null) el('tscore').textContent = 'Best: '+s.best+'/'+s.total;
} catch(e){}
</script>
</body>
</html>
