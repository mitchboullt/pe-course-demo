<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Phase Test — Interactive Course</title>
<style>
  :root { --bg:#0f1419; --panel:#1a212b; --line:#2a3543; --ink:#e6edf3; --mut:#8b98a8;
          --accent:#4f9cf9; --good:#3fb950; --bad:#f85149; --warn:#d29922; }
  * { box-sizing:border-box; }
  body { margin:0; font:15px/1.6 -apple-system,Segoe UI,Roboto,sans-serif; background:var(--bg); color:var(--ink); }
  .top { display:flex; align-items:center; gap:14px; padding:14px 22px; border-bottom:1px solid var(--line);
         position:sticky; top:0; background:rgba(15,20,25,.94); backdrop-filter:blur(6px); z-index:10; }
  .top a.home { color:var(--mut); text-decoration:none; font-size:13px; }
  .top a.home:hover { color:var(--accent); }
  .top .title { font-weight:700; flex:1; font-size:15px; }
  .top .score { font-size:13px; color:var(--mut); }
  .wrap { max-width:820px; margin:0 auto; padding:26px 22px 90px; }
  h1 { font-size:24px; margin:0 0 6px; }
  .intro { color:var(--mut); background:var(--panel); border:1px solid var(--line); border-radius:12px; padding:16px 18px; margin:16px 0 26px; }
  .q { background:var(--panel); border:1px solid var(--line); border-radius:12px; padding:18px 20px; margin:14px 0; }
  .q.unanswered.flagged { border-color:var(--warn); }
  .qh { font-weight:600; margin-bottom:12px; }
  .qh .n { color:var(--accent); margin-right:8px; }
  .opt { display:flex; gap:10px; align-items:flex-start; padding:10px 12px; border:1px solid var(--line); border-radius:9px;
         margin:7px 0; cursor:pointer; transition:background .12s,border-color .12s; }
  .opt:hover { background:#10161e; }
  .opt.sel { border-color:var(--accent); background:rgba(79,156,249,.10); }
  .opt .let { font-weight:700; color:var(--mut); flex:none; width:20px; }
  .opt.sel .let { color:var(--accent); }
  .graded .opt { cursor:default; }
  .graded .opt.correct { border-color:var(--good); background:rgba(63,185,80,.12); }
  .graded .opt.correct .let { color:var(--good); }
  .graded .opt.wrongpick { border-color:var(--bad); background:rgba(248,81,73,.12); }
  .graded .opt.wrongpick .let { color:var(--bad); }
  .expl { display:none; margin-top:12px; padding:11px 13px; border-left:3px solid var(--accent);
          background:#0c1117; border-radius:0 8px 8px 0; color:#c9d4e0; font-size:14px; }
  .graded .expl { display:block; }
  .expl.ok { border-left-color:var(--good); }
  .expl.no { border-left-color:var(--bad); }
  .bar { position:fixed; left:0; right:0; bottom:0; background:rgba(15,20,25,.97); border-top:1px solid var(--line);
         padding:12px 22px; display:flex; align-items:center; gap:16px; }
  .bar .status { flex:1; color:var(--mut); font-size:13.5px; }
  button { font:inherit; font-weight:600; cursor:pointer; border:0; border-radius:9px; padding:11px 20px; }
  #submit { background:var(--good); color:#fff; }
  #submit:disabled { background:#39414d; color:#8b98a8; cursor:not-allowed; }
  #retry { background:var(--panel); color:var(--ink); border:1px solid var(--line); display:none; }
  .result { display:none; text-align:center; padding:22px; border-radius:14px; margin:8px 0 22px; font-size:16px; }
  .result.pass { background:rgba(63,185,80,.12); border:1px solid rgba(63,185,80,.4); }
  .result.fail { background:rgba(210,153,34,.12); border:1px solid rgba(210,153,34,.4); }
  .result .big { font-size:34px; font-weight:800; display:block; margin-bottom:4px; }
</style>
</head>
<body>
<div id="pe-gate" style="position:fixed;inset:0;z-index:2147483647;background:#0d1117;display:flex;align-items:center;justify-content:center;font-family:system-ui,-apple-system,Segoe UI,Roboto,sans-serif">
  <div style="background:#161b22;border:1px solid #30363d;border-radius:14px;padding:30px 32px;max-width:360px;width:88%;text-align:center;color:#e6edf3;box-shadow:0 12px 40px rgba(0,0,0,.5)">
    <div style="font-size:21px;font-weight:700;margin-bottom:6px">Private Equity Course</div>
    <div style="color:#8b949e;font-size:13.5px;margin-bottom:18px">Enter your access code to continue.</div>
    <input id="pe-gate-input" type="password" placeholder="Access code" autocomplete="off"
      style="width:100%;box-sizing:border-box;padding:11px 12px;border-radius:8px;border:1px solid #30363d;background:#0d1117;color:#e6edf3;font-size:15px;outline:none">
    <div id="pe-gate-err" style="color:#f85149;font-size:12.5px;height:15px;margin:8px 0 2px"></div>
    <button id="pe-gate-btn" style="width:100%;padding:11px;border:0;border-radius:8px;background:#238636;color:#fff;font-size:15px;font-weight:600;cursor:pointer">Enter</button>
  </div>
</div>
<script>
(function(){
  var HASH="2ab47ce2424d6043168f930c79e3931f57f9e86ad33a8e35c2e9b6d3f1444924";
  var g=document.getElementById('pe-gate');
  if(localStorage.getItem('pe_demo_ok')==='1'){ g.remove(); return; }
  document.documentElement.style.overflow='hidden';
  var inp=document.getElementById('pe-gate-input'), err=document.getElementById('pe-gate-err');
  try{ inp.focus(); }catch(e){}
  async function sha(s){ var b=await crypto.subtle.digest('SHA-256', new TextEncoder().encode(s)); return Array.from(new Uint8Array(b)).map(function(x){return x.toString(16).padStart(2,'0');}).join(''); }
  async function submit(){
    var v=inp.value; if(!v) return;
    var h; try{ h=await sha(v); }catch(e){ err.textContent='Browser too old'; return; }
    if(h===HASH){ localStorage.setItem('pe_demo_ok','1'); localStorage.setItem('pe_demo_code',v); document.documentElement.style.overflow=''; g.remove(); }
    else { err.textContent='Incorrect code'; inp.value=''; inp.focus(); }
  }
  document.getElementById('pe-gate-btn').onclick=submit;
  inp.addEventListener('keydown', function(e){ if(e.key==='Enter') submit(); });
})();
</script>
<div class="top">
  <a class="home" href="../index.html">☰ All lessons</a>
  <span class="title" id="ttitle"></span>
  <span class="score" id="tscore"></span>
</div>
<div class="wrap">
  <h1 id="h1"></h1>
  <div class="intro" id="intro"></div>
  <div class="result" id="result"></div>
  <div id="questions"></div>
</div>
<div class="bar">
  <span class="status" id="status"></span>
  <button id="retry">Retry</button>
  <button id="submit">Submit test</button>
</div>
<script>
const DATA = {"phase": "0", "title": "Phase 0 Test — Orientation", "pass_mark": 20, "questions": [{"n": 1, "prompt": "What most precisely distinguishes private equity from public equity investing?", "options": {"A": "PE only invests in technology companies", "B": "PE takes controlling stakes in private (or take-private) companies through pooled, closed-end funds", "C": "PE never uses debt to finance acquisitions", "D": "PE investors can sell their stakes on a stock exchange at any time"}, "answer": "B", "explanation": "PE is defined by control-oriented, pooled, closed-end fund investing in private companies — not by sector, and it very much uses debt."}, {"n": 2, "prompt": "In a PE fund, who are the two primary parties?", "options": {"A": "The buyer and the seller", "B": "The general partner (GP) and the limited partners (LPs)", "C": "The lender and the borrower", "D": "The regulator and the fund administrator"}, "answer": "B", "explanation": "The GP manages; the LPs provide the capital."}, {"n": 3, "prompt": "What is the general partner's (GP's) core role?", "options": {"A": "To provide the bulk of the fund's capital", "B": "To raise the fund, source and manage investments, and drive value creation", "C": "To passively hold shares and collect dividends", "D": "To lend senior debt to portfolio companies"}, "answer": "B", "explanation": "The GP raises the fund, sources deals, manages the portfolio, and drives value creation."}, {"n": 4, "prompt": "What is the defining characteristic of a limited partner's (LP's) liability?", "options": {"A": "Unlimited — LPs are liable for all fund debts", "B": "Limited to the amount of capital they commit to the fund", "C": "Zero — LPs bear no economic risk", "D": "Equal to the GP's liability"}, "answer": "B", "explanation": "LP liability is capped at committed capital — the \"limited\" in limited partner."}, {"n": 5, "prompt": "Which of the following is a *buyout* strategy rather than venture capital?", "options": {"A": "Seed funding a two-person startup with no revenue", "B": "Acquiring a control stake in a mature, cash-generative company, often using leverage", "C": "Buying a minority stake in a fast-growing pre-profit software firm", "D": "Providing a convertible note to an early-stage biotech"}, "answer": "B", "explanation": "Control of a mature, cash-generative company (often levered) is the buyout archetype; the others describe VC/growth."}, {"n": 6, "prompt": "A PE fund is typically a \"closed-end\" vehicle. What does that mean?", "options": {"A": "LPs can redeem their capital on demand, like a mutual fund", "B": "The fund has a fixed life (commonly ~10 years) and LPs cannot freely withdraw capital", "C": "The fund is closed to new investments forever", "D": "The fund only invests in closed (bankrupt) companies"}, "answer": "B", "explanation": "Closed-end = fixed life (~10 years) with no on-demand redemption, unlike an open-end mutual fund."}, {"n": 7, "prompt": "Which of these best describes *growth equity*?", "options": {"A": "Control buyouts of distressed companies", "B": "Minority investments in established, expanding companies that need capital to scale, usually with little or no leverage", "C": "Lending to companies in bankruptcy", "D": "Buying government bonds"}, "answer": "B", "explanation": "Growth equity = minority, largely unlevered capital for established companies that need to scale."}, {"n": 8, "prompt": "Why do institutional LPs allocate to private equity despite its illiquidity?", "options": {"A": "Because PE guarantees positive returns", "B": "For the potential of higher long-term returns (an illiquidity premium) and portfolio diversification", "C": "Because PE holdings can be sold instantly", "D": "Because regulators require it"}, "answer": "B", "explanation": "LPs accept illiquidity in exchange for a potential return premium and diversification benefits."}, {"n": 9, "prompt": "Which of the following is a typical LP in a private equity fund?", "options": {"A": "A retail day-trader", "B": "A public pension fund", "C": "A high-street commercial bank's checking-account customer", "D": "A payday lender"}, "answer": "B", "explanation": "Public pension funds are a core LP type; retail traders and depositors are not."}, {"n": 10, "prompt": "The GP contributes its own capital to the fund. This \"GP commitment\" primarily serves to:", "options": {"A": "Provide most of the fund's investable capital", "B": "Align the GP's incentives with LPs by putting the GP's own money at risk (\"skin in the game\")", "C": "Satisfy a tax requirement", "D": "Replace the need for management fees"}, "answer": "B", "explanation": "The GP commitment aligns incentives — skin in the game — not fund financing."}, {"n": 11, "prompt": "What is the usual holding period for a PE buyout investment before exit?", "options": {"A": "A few days", "B": "Roughly 3–7 years", "C": "25–30 years", "D": "There is no exit; PE holds forever"}, "answer": "B", "explanation": "Buyout holds typically run ~3–7 years."}, {"n": 12, "prompt": "Which statement about leverage in a classic buyout is correct?", "options": {"A": "Leverage is prohibited by law in all PE deals", "B": "The acquired company's own cash flows and assets typically support the acquisition debt", "C": "The LPs personally guarantee the acquisition debt", "D": "Leverage plays no role in buyout returns"}, "answer": "B", "explanation": "In an LBO the target's own cash flows and assets service the acquisition debt; LPs do not guarantee it."}, {"n": 13, "prompt": "Which of the following is NOT one of the three broad PE strategy families introduced at orientation?", "options": {"A": "Buyout", "B": "Growth equity", "C": "Venture capital", "D": "Index tracking"}, "answer": "D", "explanation": "Index tracking is a public-market passive strategy, not a PE family."}, {"n": 14, "prompt": "A sovereign wealth fund, a corporate pension plan, and a university endowment invest in a PE fund. In that fund, they are:", "options": {"A": "General partners", "B": "Limited partners", "C": "Portfolio companies", "D": "Lenders"}, "answer": "B", "explanation": "They are all limited partners."}, {"n": 15, "prompt": "Why is a PE fund usually structured as a *limited partnership*?", "options": {"A": "To make the fund publicly traded", "B": "To provide pass-through tax treatment and limited liability for investors while giving the GP management control", "C": "To eliminate all fees", "D": "To guarantee LPs a fixed coupon"}, "answer": "B", "explanation": "The LP structure delivers pass-through tax + limited liability for investors while the GP retains control."}, {"n": 16, "prompt": "From an LP's perspective, the single biggest structural drawback of committing to a PE fund is:", "options": {"A": "The requirement to actively manage portfolio companies", "B": "Illiquidity — capital is locked up for years with no easy exit", "C": "Unlimited personal liability", "D": "Daily mark-to-market volatility"}, "answer": "B", "explanation": "Illiquidity is the defining LP drawback; LPs are passive (no management duty) and have limited liability."}, {"n": 17, "prompt": "What does \"committed capital\" mean?", "options": {"A": "Cash the LP has already wired into the fund on day one", "B": "The total amount an LP has pledged, to be drawn down by the GP over time as deals arise", "C": "The GP's management fee", "D": "The fund's total realised profit"}, "answer": "B", "explanation": "Committed capital is the pledged total, drawn down over time via capital calls."}, {"n": 18, "prompt": "Which motivation is most associated with an *endowment* as a PE LP?", "options": {"A": "Matching short-term liabilities that come due next month", "B": "Long-horizon growth to fund the institution in perpetuity, tolerant of illiquidity", "C": "Providing daily liquidity to depositors", "D": "Meeting weekly payroll"}, "answer": "B", "explanation": "Endowments have perpetual horizons and high illiquidity tolerance."}, {"n": 19, "prompt": "A company is mature, profitable, generating steady cash flow, and its founder wants to retire. Which PE strategy is the most natural fit?", "options": {"A": "Seed venture capital", "B": "A control buyout", "C": "A public index fund", "D": "A short position"}, "answer": "B", "explanation": "A retiring founder with a mature, profitable company is a classic buyout target."}, {"n": 20, "prompt": "Which of the following most accurately frames the GP–LP relationship?", "options": {"A": "Equal co-managers who share all decisions daily", "B": "A principal–agent relationship: LPs (principals) delegate capital and management to the GP (agent)", "C": "Competitors bidding against each other", "D": "Lender and borrower"}, "answer": "B", "explanation": "It is a principal–agent relationship: LPs delegate to the GP."}, {"n": 21, "prompt": "\"Dry powder\" refers to:", "options": {"A": "Committed capital that has been raised but not yet invested", "B": "Debt that has been fully repaid", "C": "A portfolio company's inventory", "D": "Distributions already paid to LPs"}, "answer": "A", "explanation": "Dry powder = raised-but-uninvested committed capital."}, {"n": 22, "prompt": "Compared with venture capital, buyout investing generally involves:", "options": {"A": "Minority stakes in pre-revenue companies", "B": "Control stakes in established companies, frequently financed with debt", "C": "No due diligence", "D": "Publicly listed shares only"}, "answer": "B", "explanation": "Buyout = control stakes in established companies, often debt-financed."}, {"n": 23, "prompt": "Which is the best one-line description of what a PE firm ultimately sells to its LPs?", "options": {"A": "Guaranteed income", "B": "Access to a manager who can buy, improve, and profitably exit private companies", "C": "A checking account", "D": "Insurance against market losses"}, "answer": "B", "explanation": "LPs are really buying access to a manager's ability to buy, improve, and exit private companies."}, {"n": 24, "prompt": "Why can PE managers, in principle, act more decisively than public-company boards?", "options": {"A": "They face daily shareholder votes", "B": "Concentrated ownership and control let them make long-horizon changes without quarterly public-market pressure", "C": "They are exempt from all fiduciary duties", "D": "They never use outside advisers"}, "answer": "B", "explanation": "Concentrated control frees PE from quarterly public-market pressure, enabling long-horizon change."}, {"n": 25, "prompt": "Putting it together: which sequence correctly orders the life of a PE investment at the highest level?", "options": {"A": "Exit → invest → raise fund → improve company", "B": "Raise fund → source and acquire company → improve it over the hold → exit and return capital", "C": "Improve company → raise fund → exit → acquire", "D": "Acquire company → return capital → raise fund → source deals"}, "answer": "B", "explanation": "Raise → acquire → improve → exit and return capital is the high-level lifecycle."}]};
const LS = 'pe-test::'+DATA.phase;
const el = id => document.getElementById(id);
const LETTERS = ['A','B','C','D'];
let picks = {};   // n -> letter
let graded = false;

el('ttitle').textContent = DATA.title;
el('h1').textContent = DATA.title;
el('intro').innerHTML = DATA.questions.length+' multiple-choice questions. Choose one answer per question, then press '+
  '<b>Submit test</b>. You need <b>'+DATA.pass_mark+'/'+DATA.questions.length+'</b> ('+
  Math.round(DATA.pass_mark/DATA.questions.length*100)+'%) to pass. Answers and explanations reveal on submit.';

const qwrap = el('questions');
DATA.questions.forEach(q=>{
  const card = document.createElement('div');
  card.className='q unanswered'; card.id='q'+q.n;
  // Shuffle options so the correct choice isn't positionally predictable
  // (authored keys cluster on one letter). Remap to fresh display letters and
  // record the correct display letter on the question.
  let entries = LETTERS.filter(L=>q.options[L]).map(L=>({orig:L, text:q.options[L]}));
  for(let i=entries.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); const t=entries[i]; entries[i]=entries[j]; entries[j]=t; }
  let opts = '';
  entries.forEach((e,idx)=>{
    const D = LETTERS[idx];
    if(e.orig===q.answer) q._correct = D;
    opts += '<div class="opt" data-n="'+q.n+'" data-l="'+D+'"><span class="let">'+D+'</span><span>'+e.text+'</span></div>';
  });
  card.innerHTML = '<div class="qh"><span class="n">Q'+q.n+'</span>'+q.prompt+'</div>'+opts+
    '<div class="expl" id="expl'+q.n+'"></div>';
  qwrap.appendChild(card);
});

qwrap.addEventListener('click', e=>{
  if(graded) return;
  const opt = e.target.closest('.opt'); if(!opt) return;
  const n = opt.dataset.n, L = opt.dataset.l;
  picks[n] = L;
  const card = el('q'+n);
  card.classList.remove('unanswered');
  card.querySelectorAll('.opt').forEach(o=>o.classList.toggle('sel', o.dataset.l===L));
  updateStatus();
});

function updateStatus(){
  const done = Object.keys(picks).length, total = DATA.questions.length;
  el('status').textContent = graded ? '' : done+' of '+total+' answered'+(done<total?'':' — ready to submit');
}
updateStatus();

el('submit').onclick = ()=>{
  const total = DATA.questions.length, done = Object.keys(picks).length;
  if(done<total){
    const miss = DATA.questions.filter(q=>!picks[q.n]);
    if(!confirm(done+' of '+total+' answered. '+(total-done)+' left blank will be marked wrong. Submit anyway?')){
      miss.forEach(q=>{ const c=el('q'+q.n); c.classList.add('flagged'); });
      if(miss[0]) el('q'+miss[0].n).scrollIntoView({behavior:'smooth',block:'center'});
      return;
    }
  }
  grade();
};

function grade(){
  graded = true;
  let correct = 0;
  DATA.questions.forEach(q=>{
    const card = el('q'+q.n); card.classList.add('graded');
    const pick = picks[q.n];
    const ans = q._correct;   // display letter of the correct option (post-shuffle)
    if(pick===ans) correct++;
    card.querySelectorAll('.opt').forEach(o=>{
      const L=o.dataset.l;
      if(L===ans) o.classList.add('correct');
      if(L===pick && pick!==ans) o.classList.add('wrongpick');
    });
    const ex = el('expl'+q.n);
    const got = pick===ans;
    ex.className = 'expl '+(got?'ok':'no');
    ex.innerHTML = '<b>'+(got?'Correct':(pick?'Not quite':'No answer'))+' — answer '+ans+'.</b> '+(q.explanation||'');
  });
  const total = DATA.questions.length, pct = Math.round(correct/total*100);
  const pass = correct>=DATA.pass_mark;
  const r = el('result');
  r.className = 'result '+(pass?'pass':'fail'); r.style.display='block';
  r.innerHTML = '<span class="big">'+correct+' / '+total+'  ·  '+pct+'%</span>'+
    (pass ? 'Passed — you cleared this phase. Review any misses, then continue to the next phase.'
          : 'Below the '+DATA.pass_mark+'/'+total+' pass mark. Review the explanations and the linked notes, then retake cold.');
  el('tscore').textContent = correct+'/'+total+' ('+pct+'%)';
  el('status').textContent = 'Scored '+correct+'/'+total+'. Scroll to review explanations.';
  el('submit').disabled = true; el('submit').style.display='none';
  el('retry').style.display='inline-block';
  try {
    const prev = JSON.parse(localStorage.getItem(LS)||'{}');
    localStorage.setItem(LS, JSON.stringify({best: Math.max(correct, prev.best||0), last: correct, total: total}));
  } catch(e){}
  window.scrollTo({top:0, behavior:'smooth'});
}

el('retry').onclick = ()=>{
  graded=false; picks={};
  el('result').style.display='none';
  el('tscore').textContent='';
  el('submit').disabled=false; el('submit').style.display='inline-block';
  el('retry').style.display='none';
  document.querySelectorAll('.q').forEach(c=>{ c.className='q unanswered'; });
  document.querySelectorAll('.opt').forEach(o=>o.classList.remove('sel','correct','wrongpick'));
  updateStatus();
  window.scrollTo({top:0, behavior:'smooth'});
};

try {
  const s = JSON.parse(localStorage.getItem(LS)||'{}');
  if(s.best!=null) el('tscore').textContent = 'Best: '+s.best+'/'+s.total;
} catch(e){}
</script>
</body>
</html>
